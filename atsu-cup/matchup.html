<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯 組み合わせを決める</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
<style>
  .decide-tabs{display:flex; gap:8px; margin-bottom:14px;}
  .decide-tabs button{flex:1; margin-top:0;}
  .next-match-box{
    background:linear-gradient(180deg,rgba(255,145,69,.16),rgba(255,106,43,.06)); border:1px solid var(--ember2);
    border-radius:14px; padding:14px; margin-bottom:16px;
  }
  .next-match-box .lbl{font-size:11px; letter-spacing:.15em; color:var(--ember2); font-weight:900; text-transform:uppercase; margin-bottom:10px;}
  .next-match-box .pair{display:flex; align-items:center; gap:10px;}
  .next-slot{
    flex:1; display:flex; align-items:center; gap:8px; background:#0d0a14; border:1px solid var(--line);
    border-radius:10px; padding:12px; cursor:pointer; font-weight:700; font-size:13.5px; min-width:0;
  }
  .next-slot span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .next-slot:active{ transform:scale(.97); background:rgba(255,255,255,.08); }
  .next-vs{color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; flex-shrink:0;}
  .avatar{
    width:26px; height:26px; border-radius:50%; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900;
    color:var(--gold); flex-shrink:0;
  }
  .bracket-scroll{overflow-x:auto; padding-bottom:8px; margin:0 -16px; padding-left:16px; padding-right:16px;}
  .bracket{display:flex; gap:50px; min-width:max-content; padding:6px 2px 16px; position:relative;}
  .round-col{display:flex; flex-direction:column; justify-content:space-around; gap:16px; min-width:190px; position:relative; z-index:1;}
  .round-title{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--bg); text-align:center;
    letter-spacing:.1em; margin-bottom:8px; text-transform:uppercase; background:var(--gold); border-radius:999px;
    padding:4px 10px; font-weight:900;
  }
  svg.bracket-lines{position:absolute; left:0; top:0; z-index:0; pointer-events:none;}
  .match{background:#0d0a14; border:1.5px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.35); position:relative; z-index:1;}
  .match.forced{border-color:#7a2c2c; box-shadow:0 0 0 1px #7a2c2c inset;}
  .match.ready{border-color:var(--ember2); box-shadow:0 0 0 1px var(--ember2) inset, 0 0 14px rgba(255,106,43,.25);}
  .slot{
    padding:12px; font-size:13.5px; display:flex; align-items:center; gap:8px;
    cursor:pointer; border-bottom:1px solid var(--line); color:var(--cream); transition:background .15s;
  }
  .slot .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .slot:last-child{border-bottom:none;}
  .slot .cam-mark{font-size:11px; opacity:.75; flex-shrink:0;}
  .slot.bye{color:var(--muted); font-style:italic; cursor:default;}
  .slot.winner{background:linear-gradient(90deg,rgba(232,179,76,.32),rgba(232,179,76,.05)); color:var(--gold); font-weight:900; border-left:3px solid var(--gold);}
  .slot.winner .avatar{border-color:var(--gold);}
  .slot.winner::after{content:'👑'; font-size:13px; flex-shrink:0;}
  .slot.empty{color:#463b58; cursor:default;}
  .slot.pending{color:var(--muted); cursor:default; letter-spacing:.05em;}
  .slot.pending .q{display:inline-block; animation:atsuPendingPulse 1.3s ease-in-out infinite;}
  .slot.swap-picked{background:rgba(255,106,43,.28); outline:2px solid var(--ember2); outline-offset:-2px;}
  @keyframes atsuPendingPulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .slot:not(.bye):not(.empty):not(.pending):active{background:rgba(255,255,255,.08);}
  .slot:not([data-r]):not(.bye):not(.empty):not(.pending){cursor:default;}
  .warn-box{
    margin-top:14px; background:#241214; border:1px solid #5a2222; border-radius:10px; padding:10px 12px;
    font-size:12px; color:#ffb3b3; line-height:1.8;
  }
  .champion-box{
    margin-top:18px; text-align:center; padding:22px 14px; border-radius:14px;
    background:radial-gradient(circle at 50% 0%, rgba(232,179,76,.2), transparent 70%), #14100a; border:1px solid var(--gold-dim);
  }
  .champion-box .label{font-size:11px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase;}
  .champion-box .name{
    font-family:'Cinzel','Noto Serif JP',serif; font-weight:900; font-size:26px; color:var(--gold);
    margin:6px 0 14px; text-shadow:0 0 16px rgba(232,179,76,.5);
  }
  .wheel-stage{display:flex; flex-direction:column; align-items:center; padding:8px 0 4px;}
  .wheel-holder{position:relative; width:260px; height:260px; margin:0 auto;}
  .pointer{
    position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:0; height:0;
    border-left:14px solid transparent; border-right:14px solid transparent; border-top:22px solid var(--gold);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); z-index:5;
  }
  canvas#wheel{border-radius:50%; box-shadow:0 0 0 4px #0d0a14, 0 0 0 6px var(--gold-dim), 0 10px 30px rgba(0,0,0,.5);}
  .wheel-center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:60px;
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #3a2c14, #14100a); border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; z-index:4; font-size:20px;
    box-shadow:0 0 14px rgba(232,179,76,.4);
  }
  .picked-banner{
    margin-top:16px; text-align:center; min-height:34px; font-family:'Cinzel','Noto Serif JP',serif;
    font-size:19px; font-weight:900; color:var(--gold); text-shadow:0 0 12px rgba(232,179,76,.5);
  }
  .picked-banner.seed{
    color:#fff2da; text-shadow:0 0 22px rgba(232,179,76,.95), 0 0 40px rgba(255,106,43,.6);
    animation:atsuSeedPulse 650ms ease-in-out 2;
  }
  @keyframes atsuSeedPulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.16);} }
  .seed-particle{
    position:fixed; font-size:22px; pointer-events:none; z-index:2147483000;
    animation:atsuSeedFly 900ms ease-out forwards;
  }
  @keyframes atsuSeedFly{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15); opacity:0; }
  }
  .order-list{margin-top:14px; display:flex; flex-direction:column; gap:6px;}
  .order-item{
    display:flex; align-items:center; gap:8px; background:#0d0a14; border:1px solid var(--line);
    border-radius:10px; padding:9px 10px; font-size:13px;
  }
  .order-item.is-bye{border-color:var(--gold-dim); background:#181206;}
  .order-item .idx{font-family:'JetBrains Mono',monospace; color:var(--ember2); width:20px; text-align:right; font-size:12px; flex-shrink:0;}
  .order-item .cam{font-size:12px; opacity:.8;}
  .order-item button{padding:6px 10px; margin:0; font-size:13px;}
</style>
</head>
<body>
<a class="back-link" href="admin.html">‹ 大会管理へ</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">🎲</div>
    <h1>組み合わせを決める</h1>
    <div class="sub">MATCHUP</div>
  </header>

  <section class="panel">
    <h2><span class="num">01</span> 参加者</h2>
    <div id="peopleSummary"></div>
  </section>

  <section class="panel" id="decideSection" style="display:none;">
    <h2><span class="num">02</span> 組み合わせの決め方</h2>
    <div class="decide-tabs" id="decideModeTabs"></div>

    <div id="rouletteBox">
      <div class="wheel-stage">
        <div class="wheel-holder">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
          <div class="wheel-center">🐾</div>
        </div>
        <div class="picked-banner" id="pickedBanner">&nbsp;</div>
        <div class="row" style="justify-content:center;">
          <button class="btn btn-gold" id="spinBtn">ルーレットを回す</button>
        </div>
      </div>
    </div>

    <div id="manualBox" style="display:none;"></div>

    <div class="row">
      <button class="btn btn-primary" id="instantAutoBtn">⚡ ワンタップで自動抽選</button>
      <button class="btn btn-ghost" id="resetOrderBtn">🔄 引き直す</button>
    </div>
  </section>

  <section class="panel" id="bracketPanel">
    <h2><span class="num">03</span> 対戦表</h2>
    <div class="row" id="bracketTopActions" style="display:none; margin-top:0; margin-bottom:14px;">
      <button class="btn btn-ghost" id="saveBracketImgBtnTop">📸 画像で保存</button>
      <button class="btn btn-ghost" id="swapModeBtn" style="display:none;">🔀 組み合わせを入れ替える</button>
    </div>
    <div id="bracketArea"></div>
  </section>

  <footer class="note">参加者・大会・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
</div>

<script src="tap-ripple.js"></script>
<script src="atsucup-core.js"></script>
<script>
(function(){
  "use strict";
  const state = AtsuCup.state;
  const escapeHtml = AtsuCup.escapeHtml;
  AtsuCup.restore();

  let decideMode = 'roulette';
  let manualOrder = null;
  let swapMode = false;
  let swapPick = null;

  function initials(name){ return (name||'').trim().charAt(0) || '?'; }

  /* ---------- 参加者サマリー ---------- */
  function renderPeopleSummary(){
    const box = document.getElementById('peopleSummary');
    if(!state.people.length){
      box.innerHTML = `<div class="empty-state"><span class="big">🙋</span>参加者が選ばれていません。</div>
        <a class="btn btn-primary" style="width:100%;" href="entry.html">参加者登録へ</a>`;
      return;
    }
    const rec = state.people.filter(p=>p.rec).length;
    box.innerHTML = `
      <span class="count-badge">参加: ${state.people.length}人</span>
      <span class="count-badge muted2">📹 撮影OK: ${rec}人</span>
      <span class="count-badge muted2">🚫 撮影不可: ${state.people.length-rec}人</span>
      <div class="row"><a class="btn btn-ghost" href="entry.html">参加者を編集する</a></div>
    `;
  }

  /* ---------- 組み合わせの決め方 ---------- */
  function flattenOrder(){
    if(state.matches.length){
      const names = [];
      state.matches[0].forEach(m=>{ if(m.a) names.push(m.a); if(m.b) names.push(m.b); });
      if(names.length) return names;
    }
    return state.people.map(p=>p.name);
  }

  function renderDecideModeTabs(){
    document.getElementById('decideModeTabs').innerHTML = `
      <button class="btn ${decideMode==='roulette'?'btn-gold':'btn-ghost'}" id="modeRouletteBtn">🎡 ルーレット</button>
      <button class="btn ${decideMode==='manual'?'btn-gold':'btn-ghost'}" id="modeManualBtn">✋ 手動で決める</button>
    `;
    document.getElementById('modeRouletteBtn').addEventListener('click', ()=>{
      decideMode = 'roulette'; manualOrder = null;
      document.getElementById('rouletteBox').style.display = 'block';
      document.getElementById('manualBox').style.display = 'none';
      renderDecideModeTabs();
    });
    document.getElementById('modeManualBtn').addEventListener('click', ()=>{
      decideMode = 'manual'; manualOrder = flattenOrder();
      document.getElementById('rouletteBox').style.display = 'none';
      document.getElementById('manualBox').style.display = 'block';
      renderDecideModeTabs();
      renderManualEditor();
    });
  }

  function renderManualEditor(){
    const manualBox = document.getElementById('manualBox');
    const recMap = AtsuCup.recMapOf();
    const size = AtsuCup.nextPow2(manualOrder.length);
    const byeCount = size - manualOrder.length;
    manualBox.innerHTML = `
      <p class="hint">↑↓で順番を並べ替えてください。上から2人ずつ対戦になり、下の${byeCount}人が不戦勝(BYE)になります。</p>
      <div class="order-list">
        ${manualOrder.map((name,i)=>{
          const isBye = byeCount>0 && i >= manualOrder.length - byeCount;
          return `<div class="order-item ${isBye?'is-bye':''}">
            <span class="idx">${i+1}</span>
            <span style="flex:1;">${escapeHtml(name)}</span>
            <span class="cam">${recMap[name]?'📹':'🚫'}</span>
            ${isBye?'<span class="count-badge" style="margin:0;">BYE</span>':''}
            <button class="btn btn-ghost" data-move="-1" data-idx="${i}">↑</button>
            <button class="btn btn-ghost" data-move="1" data-idx="${i}">↓</button>
          </div>`;
        }).join('')}
      </div>
      <div class="row">
        <button class="btn btn-primary" id="applyManualBtn">この組み合わせで決定する</button>
      </div>
    `;
    manualBox.querySelectorAll('[data-move]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = +btn.dataset.idx, dir = +btn.dataset.move;
        const j = idx+dir;
        if(j<0 || j>=manualOrder.length) return;
        [manualOrder[idx], manualOrder[j]] = [manualOrder[j], manualOrder[idx]];
        renderManualEditor();
      });
    });
    document.getElementById('applyManualBtn').addEventListener('click', ()=>{
      state.matches = [AtsuCup.buildRound1Manual(manualOrder)];
      state.order = [...manualOrder];
      state.remaining = [];
      state.thirdPlaceMatch = null;
      state.winnerName = "";
      manualOrder = null;
      AtsuCup.persist();
      decideMode = 'roulette';
      document.getElementById('rouletteBox').style.display = 'block';
      document.getElementById('manualBox').style.display = 'none';
      renderDecideModeTabs();
      refreshUI();
    });
  }

  document.getElementById('instantAutoBtn').addEventListener('click', ()=>{
    if(!state.people.length) return;
    AtsuCup.resetDownstream(); // 撮影不可同士を避けつつ、新しくシャッフルして組む
    state.remaining = [];
    state.order = state.people.map(p=>p.name);
    AtsuCup.persist();
    pickedBanner.innerHTML = "&nbsp;";
    refreshUI();
  });
  document.getElementById('resetOrderBtn').addEventListener('click', ()=>{
    AtsuCup.resetDownstream();
    pickedBanner.innerHTML = "&nbsp;";
    refreshUI();
  });

  /* ---------- ルーレット ---------- */
  const wheelCanvas = document.getElementById("wheel");
  const ctx = wheelCanvas.getContext("2d");
  const pickedBanner = document.getElementById("pickedBanner");
  const spinBtn = document.getElementById("spinBtn");
  const WHEEL_COLORS = ["#ff6a2b","#e8b34c","#7c4dff","#2bc9a0","#ff4d94","#4fb0e8","#a8e83b","#ff9145"];
  let currentRotation = 0;
  let spinning = false;

  function drawWheel(){
    const list = state.remaining.length ? state.remaining : ["参加者を登録してください"];
    const n = list.length;
    const R = wheelCanvas.width/2;
    ctx.clearRect(0,0,wheelCanvas.width,wheelCanvas.height);
    ctx.save();
    ctx.translate(R,R);
    ctx.rotate(currentRotation);
    const seg = (Math.PI*2)/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,R-4, i*seg, (i+1)*seg);
      ctx.closePath();
      ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
      ctx.fill();
      ctx.save();
      ctx.rotate(i*seg + seg/2);
      ctx.textAlign = "right";
      ctx.fillStyle = "#160f08";
      ctx.font = "bold 13px 'Noto Sans JP', sans-serif";
      const label = list[i].length > 8 ? list[i].slice(0,7)+"…" : list[i];
      ctx.fillText(label, R-16, 5);
      ctx.restore();
    }
    ctx.restore();
  }

  function spawnSeedParticles(){
    const holder = document.querySelector('.wheel-holder');
    if(!holder) return;
    const rect = holder.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const emojis = ['🎉','✨','⭐','🎊'];
    for(let i=0;i<10;i++){
      const el = document.createElement('span');
      el.className = 'seed-particle';
      el.textContent = emojis[i % emojis.length];
      const angle = Math.random()*Math.PI*2;
      const dist = 80 + Math.random()*110;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      el.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 950);
    }
  }

  function easeOutBackSpin(t, s){
    const p = t - 1;
    return 1 + (s + 1) * p * p * p + s * p * p;
  }

  spinBtn.addEventListener("click", ()=>{
    if(spinning) return;
    if(!state.remaining.length){
      if(!state.people.length){ alert("先に参加者を登録してください。"); return; }
      return;
    }
    spinning = true;
    spinBtn.disabled = true;
    const n = state.remaining.length;
    const seg = (Math.PI*2)/n;
    const winnerIdx = Math.floor(Math.random()*n);
    const targetSegCenter = winnerIdx*seg + seg/2;
    const spinDir = Math.random() < 0.3 ? -1 : 1;
    const extraSpins = 4 + Math.random()*4;
    const backStrength = 0.7 + Math.random()*1.3;
    const duration = 2600 + Math.random()*1500;
    const baseRotation = currentRotation + spinDir*extraSpins*Math.PI*2;
    const correction = -Math.PI/2 - (baseRotation % (Math.PI*2)) - targetSegCenter;
    const finalRotation = baseRotation + correction;
    const startRotation = currentRotation;
    const delta = finalRotation - startRotation;
    const startTime = performance.now();
    function frame(now){
      const t = Math.min(1, (now-startTime)/duration);
      currentRotation = startRotation + delta*easeOutBackSpin(t, backStrength);
      drawWheel();
      if(t < 1){ requestAnimationFrame(frame); }
      else{
        currentRotation = finalRotation;
        drawWheel();
        spinning = false;
        spinBtn.disabled = false;
        const picked = state.remaining[winnerIdx];
        state.remaining.splice(winnerIdx,1);
        state.order.push(picked);
        const isSeed = state.matches.length>0 && state.matches[0].some(m=>m.a===picked && m.b===null);
        pickedBanner.classList.toggle('seed', isSeed);
        if(isSeed){
          pickedBanner.textContent = "🎉 シード権獲得！ " + picked;
          spawnSeedParticles();
        }else{
          pickedBanner.textContent = "🎯 " + picked;
        }
        AtsuCup.persist();
        renderBracket();
        if(state.remaining.length === 0){
          setTimeout(()=>{ document.getElementById('bracketPanel').scrollIntoView({behavior:'smooth', block:'start'}); }, 900);
        }
      }
    }
    requestAnimationFrame(frame);
  });

  /* ---------- 対戦表 ---------- */
  function slotHtml(val, winner, r, m, side, recMap, isPicked){
    if(val === null || val === undefined){
      if(val === null) return `<div class="slot bye">BYE (不戦勝)</div>`;
      return `<div class="slot empty">未定</div>`;
    }
    if(!AtsuCup.isRevealed(val)){
      return `<div class="slot pending"><span class="q">🎲 ？？？</span></div>`;
    }
    const isWinner = winner === val;
    const cam = recMap[val] ? "📹" : "🚫";
    return `<div class="slot ${isWinner?'winner':''} ${isPicked?'swap-picked':''}" data-r="${r}" data-m="${m}" data-side="${side}">
      <span class="avatar">${escapeHtml(initials(val))}</span>
      <span class="nm">${escapeHtml(val)}</span>
      <span class="cam-mark">${cam}</span>
    </div>`;
  }

  function findNextMatch(){
    for(let r=0;r<state.matches.length;r++){
      for(let m=0;m<state.matches[r].length;m++){
        const match = state.matches[r][m];
        if(match.a && match.b && AtsuCup.isRevealed(match.a) && AtsuCup.isRevealed(match.b) && !match.winner){
          return {r,m,match};
        }
      }
    }
    if(state.thirdPlaceMatch && !state.thirdPlaceMatch.winner && state.thirdPlaceMatch.a && state.thirdPlaceMatch.b){
      return {r:'third', m:0, match:state.thirdPlaceMatch};
    }
    return null;
  }

  function drawBracketConnectors(area){
    const bracketEl = area.querySelector('.bracket');
    if(!bracketEl) return;
    const roundCols = Array.from(bracketEl.querySelectorAll('.round-col'));
    if(roundCols.length < 2) return;
    const bracketRect = bracketEl.getBoundingClientRect();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'bracket-lines');
    svg.style.width = bracketEl.scrollWidth + 'px';
    svg.style.height = bracketEl.scrollHeight + 'px';

    for(let r=0; r<roundCols.length-1; r++){
      if(!state.matches[r] || !state.matches[r+1]) continue;
      const srcMatchEls = Array.from(roundCols[r].querySelectorAll('.match'));
      const nextMatchEls = Array.from(roundCols[r+1].querySelectorAll('.match'));
      state.matches[r+1].forEach((nm, ni)=>{
        const targetEl = nextMatchEls[ni];
        if(!targetEl) return;
        const tRect = targetEl.getBoundingClientRect();
        const tx = tRect.left - bracketRect.left;
        const ty = tRect.top - bracketRect.top + tRect.height/2;
        [nm.a, nm.b].forEach(name=>{
          if(!name) return;
          const srcIdx = state.matches[r].findIndex(x=>x.winner && x.winner===name);
          const srcEl = srcIdx>=0 ? srcMatchEls[srcIdx] : null;
          if(!srcEl) return;
          const sRect = srcEl.getBoundingClientRect();
          const sx = sRect.right - bracketRect.left;
          const sy = sRect.top - bracketRect.top + sRect.height/2;
          const midX = (sx+tx)/2;
          const path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', `M${sx},${sy} H${midX} V${ty} H${tx}`);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#6b5c8a');
          path.setAttribute('stroke-width', '2.5');
          path.setAttribute('stroke-linecap', 'round');
          svg.appendChild(path);
        });
      });
    }
    bracketEl.insertBefore(svg, bracketEl.firstChild);
  }

  function handleSlotClick(r, m, side){
    if(swapMode){
      if(r !== 0) return; // 組み替えはラウンド1のみ
      const match = state.matches[0][m];
      const val = side==='a' ? match.a : match.b;
      if(val==null) return;
      if(!swapPick){
        swapPick = {m, side};
        renderBracket();
        return;
      }
      if(swapPick.m===m && swapPick.side===side){
        swapPick = null; renderBracket(); return;
      }
      const match2 = state.matches[0][swapPick.m];
      const a = match2[swapPick.side];
      const b = match[side];
      match2[swapPick.side] = b;
      match[side] = a;
      if(match2.b === null) match2.winner = match2.a;
      if(match.b === null) match.winner = match.a;
      swapPick = null;
      AtsuCup.persist();
      renderBracket();
      return;
    }
    if(r === 'third'){ AtsuCup.pickThirdPlaceWinner(side); }
    else{ AtsuCup.pickWinner(r, m, side); }
    renderBracket();
    renderDecideVisibility();
  }

  function renderBracket(){
    const area = document.getElementById("bracketArea");
    const recMap = AtsuCup.recMapOf();
    const swapModeBtn = document.getElementById('swapModeBtn');
    document.getElementById("bracketTopActions").style.display = state.matches.length ? 'flex' : 'none';

    const canSwap = state.matches.length>0 && state.remaining.length===0 && AtsuCup.bracketNotStarted();
    swapModeBtn.style.display = canSwap ? 'inline-flex' : 'none';
    if(!canSwap){ swapMode = false; }
    swapModeBtn.textContent = swapMode ? '✅ 入れ替え完了' : '🔀 組み合わせを入れ替える';
    swapModeBtn.className = 'btn ' + (swapMode ? 'btn-gold' : 'btn-ghost');

    if(!state.people.length){
      area.innerHTML = `<div class="empty-state"><span class="big">🙋</span>参加者がいません。<br>「参加者を編集する」から選んでください。</div>`;
      return;
    }
    if(!state.matches.length){
      area.innerHTML = `<div class="empty-state"><span class="big">🌀</span>まだ組み合わせがありません。</div>`;
      return;
    }

    let html = '';

    const next = findNextMatch();
    if(next && !swapMode){
      const m = next.match;
      html += `<div class="next-match-box">
        <div class="lbl">🎯 次の対戦${next.r==='third'?'(3位決定戦)':''}</div>
        <div class="pair">
          <div class="next-slot" data-nr="${next.r}" data-nm="${next.m}" data-nside="a"><span class="avatar">${escapeHtml(initials(m.a))}</span><span>${escapeHtml(m.a)}</span><span>${recMap[m.a]?'📹':'🚫'}</span></div>
          <div class="next-vs">VS</div>
          <div class="next-slot" data-nr="${next.r}" data-nm="${next.m}" data-nside="b"><span class="avatar">${escapeHtml(initials(m.b))}</span><span>${escapeHtml(m.b)}</span><span>${recMap[m.b]?'📹':'🚫'}</span></div>
        </div>
      </div>`;
    }
    if(swapMode){
      html += `<p class="hint">入れ替えたい2人を順番にタップしてください。(ラウンド1のみ)</p>`;
    }

    html += `<div class="bracket-scroll"><div class="bracket">`;
    state.matches.forEach((round, r)=>{
      html += `<div class="round-col"><div class="round-title">${AtsuCup.roundLabel(round.length)}</div>`;
      round.forEach((m,i)=>{
        const isForced = m.a && m.b && AtsuCup.isRevealed(m.a) && AtsuCup.isRevealed(m.b) && !recMap[m.a] && !recMap[m.b];
        const isReady = m.a && m.b && AtsuCup.isRevealed(m.a) && AtsuCup.isRevealed(m.b) && !m.winner;
        const pickedA = swapMode && swapPick && r===0 && swapPick.m===i && swapPick.side==='a';
        const pickedB = swapMode && swapPick && r===0 && swapPick.m===i && swapPick.side==='b';
        html += `<div class="match ${isForced?'forced':''} ${isReady && !swapMode?'ready':''}">`;
        html += slotHtml(m.a, m.winner, r, i, 'a', recMap, pickedA);
        html += slotHtml(m.b, m.winner, r, i, 'b', recMap, pickedB);
        html += `</div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;

    const forced = AtsuCup.forcedPairsList();
    if(forced.length){
      html += `<div class="warn-box">⚠️ 撮影OKの人が足りず、以下は撮影不可同士の対戦になっています:<br>` +
        forced.map(f=>`・${AtsuCup.roundLabel(state.matches[f.r].length)}: ${escapeHtml(f.a)} vs ${escapeHtml(f.b)}`).join("<br>") + `</div>`;
    }

    if(state.thirdPlaceMatch){
      const tp = state.thirdPlaceMatch;
      html += `<div class="video-card" style="margin-top:14px;"><div class="vs">🥉 3位決定戦</div>
        <div class="match" style="max-width:280px;">
          ${slotHtml(tp.a, tp.winner, 'third', 0, 'a', recMap, false)}
          ${slotHtml(tp.b, tp.winner, 'third', 0, 'b', recMap, false)}
        </div>
      </div>`;
    }

    if(state.winnerName){
      html += `<div class="champion-box"><div class="label">Champion</div><div class="name">👑 ${escapeHtml(state.winnerName)}</div>
        ${state.thirdPlaceMatch&&state.thirdPlaceMatch.winner?`<div style="color:var(--muted);font-weight:700;margin-bottom:10px;">🥉 3位: ${escapeHtml(state.thirdPlaceMatch.winner)}</div>`:''}
        <div class="row" style="justify-content:center;">
          <button class="btn btn-gold" id="toCardBtn">優勝カードを作る</button>
          <a class="btn btn-ghost" href="hall.html">歴代優勝者を見る</a>
        </div>
      </div>`;
    }

    area.innerHTML = html;
    drawBracketConnectors(area);

    area.querySelectorAll(".slot[data-r]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const r = el.dataset.r === 'third' ? 'third' : +el.dataset.r;
        handleSlotClick(r, +el.dataset.m, el.dataset.side);
      });
    });
    area.querySelectorAll("[data-nr]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const r = el.dataset.nr === 'third' ? 'third' : +el.dataset.nr;
        handleSlotClick(r, +el.dataset.nm, el.dataset.nside);
      });
    });
    const toCardBtn = document.getElementById("toCardBtn");
    if(toCardBtn){
      toCardBtn.addEventListener("click", ()=>{
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = 1000; tmpCanvas.height = 1000;
        AtsuCup.generateAndSaveCard(tmpCanvas, state.tournamentMeta.title, state.winnerName);
      });
    }
  }

  document.getElementById('swapModeBtn').addEventListener('click', ()=>{
    swapMode = !swapMode;
    swapPick = null;
    renderBracket();
  });

  /* ---------- 対戦表を画像で保存 ---------- */
  async function drawBracketImage(){
    if(!state.matches.length) return;
    if(document.fonts && document.fonts.ready){ await document.fonts.ready; }
    const recMap = AtsuCup.recMapOf();
    const colW = 230, rowH = 76, colGap = 36, padTop = 130, padSide = 40;
    const maxMatches = state.matches[0].length;
    const hasThird = !!state.thirdPlaceMatch;
    const canvas = document.createElement('canvas');
    canvas.width = padSide*2 + state.matches.length*colW + (state.matches.length-1)*colGap;
    canvas.height = padTop + maxMatches*rowH + 70 + (hasThird?110:0) + 100;
    const c = canvas.getContext('2d');

    const grad = c.createRadialGradient(canvas.width/2, 0, 40, canvas.width/2, 0, canvas.width*0.75);
    grad.addColorStop(0, '#2a1f38'); grad.addColorStop(1, '#0a0810');
    c.fillStyle = grad; c.fillRect(0, 0, canvas.width, canvas.height);

    const cur = state.tournamentMeta;
    c.textAlign = 'center';
    c.fillStyle = '#e8b34c';
    c.font = "900 30px 'Cinzel','Noto Serif JP',serif";
    c.fillText((cur && cur.title) || 'あつ杯 トーナメント表', canvas.width/2, 56);
    c.font = "600 12px 'JetBrains Mono',monospace";
    c.fillStyle = 'rgba(255,255,255,.45)';
    c.fillText(new Date().toLocaleDateString('ja-JP'), canvas.width/2, 80);

    function roundRect(x,y,w,h,r){
      c.beginPath();
      c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
      c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
    }
    function drawSlot(x, y, w, name, winner, isBye){
      c.textAlign = 'left';
      if(isBye){
        c.fillStyle = '#8a7fa0'; c.font = "italic 12px 'Noto Sans JP',sans-serif";
        c.fillText('BYE (不戦勝)', x+12, y+19);
        return;
      }
      if(name == null){
        c.fillStyle = '#463b58'; c.font = "12px 'Noto Sans JP',sans-serif";
        c.fillText('未定', x+12, y+19);
        return;
      }
      const isWin = winner === name;
      c.fillStyle = isWin ? '#e8b34c' : '#f1e6cf';
      c.font = (isWin ? '900 ' : '700 ') + "13px 'Noto Sans JP',sans-serif";
      const label = name.length > 11 ? name.slice(0,10)+'…' : name;
      c.fillText((isWin ? '👑 ' : '') + label, x+12, y+19);
      c.textAlign = 'right';
      c.font = "12px sans-serif";
      c.fillText(recMap[name] ? '📹' : '🚫', x+w-10, y+19);
    }
    function drawMatch(x, y, m){
      const isForced = m.a && m.b && !recMap[m.a] && !recMap[m.b];
      c.fillStyle = '#0d0a14';
      roundRect(x, y, colW, 58, 10); c.fill();
      c.strokeStyle = isForced ? '#7a2c2c' : '#3a2f4d';
      c.lineWidth = 1.5;
      roundRect(x, y, colW, 58, 10); c.stroke();
      c.beginPath(); c.moveTo(x, y+29); c.lineTo(x+colW, y+29);
      c.strokeStyle = '#3a2f4d'; c.lineWidth = 1; c.stroke();
      drawSlot(x, y, colW, m.a, m.winner, false);
      drawSlot(x, y+29, colW, m.b, m.winner, m.b===null);
    }

    const positions = [];
    state.matches.forEach((round, r)=>{
      const x = padSide + r*(colW+colGap);
      const totalH = maxMatches*rowH;
      const step = totalH/round.length;
      positions[r] = round.map((m,i)=>({x, y: padTop + step*i + (step-58)/2}));
    });
    c.lineWidth = 2; c.strokeStyle = '#4a3d63';
    for(let r=0; r<state.matches.length-1; r++){
      state.matches[r+1].forEach((nm, ni)=>{
        const t = positions[r+1][ni];
        const tx = t.x, ty = t.y + 29;
        [nm.a, nm.b].forEach(name=>{
          if(!name) return;
          const srcIdx = state.matches[r].findIndex(x=>x.winner && x.winner===name);
          if(srcIdx < 0) return;
          const s = positions[r][srcIdx];
          const sx = s.x + colW, sy = s.y + 29;
          const midX = (sx+tx)/2;
          c.beginPath();
          c.moveTo(sx, sy); c.lineTo(midX, sy); c.lineTo(midX, ty); c.lineTo(tx, ty);
          c.stroke();
        });
      });
    }
    state.matches.forEach((round, r)=>{
      const x = padSide + r*(colW+colGap);
      c.textAlign = 'center'; c.font = "700 11px 'JetBrains Mono',monospace"; c.fillStyle = '#9a8fae';
      c.fillText(AtsuCup.roundLabel(round.length).toUpperCase(), x+colW/2, padTop-14);
      round.forEach((m,i)=>{
        drawMatch(positions[r][i].x, positions[r][i].y, m);
      });
    });

    let footerY = padTop + maxMatches*rowH + 40;
    if(hasThird){
      c.textAlign = 'center'; c.font = "700 12px 'JetBrains Mono',monospace"; c.fillStyle = '#9a8fae';
      c.fillText('🥉 3位決定戦', canvas.width/2, footerY);
      drawMatch(canvas.width/2 - colW/2, footerY+12, state.thirdPlaceMatch);
      footerY += 100;
    }
    if(state.winnerName){
      c.textAlign = 'center';
      c.font = "900 26px 'Cinzel','Noto Serif JP',serif"; c.fillStyle = '#e8b34c';
      c.fillText('👑 CHAMPION: ' + state.winnerName, canvas.width/2, footerY+20);
    }

    const link = document.createElement('a');
    const nameForFile = (cur && cur.title) ? cur.title.replace(/[^\w぀-ヿ一-鿿]/g,'') : 'tournament';
    link.download = `atsucup_bracket_${nameForFile}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
  document.getElementById("saveBracketImgBtnTop").addEventListener("click", drawBracketImage);

  /* ---------- 全体の再描画 ---------- */
  function renderDecideVisibility(){
    const decideSection = document.getElementById('decideSection');
    const show = state.people.length>0 && AtsuCup.bracketNotStarted();
    decideSection.style.display = show ? 'block' : 'none';
  }

  function refreshUI(){
    renderPeopleSummary();
    renderDecideVisibility();
    drawWheel();
    renderBracket();
  }

  renderDecideModeTabs();
  refreshUI();
})();
</script>
