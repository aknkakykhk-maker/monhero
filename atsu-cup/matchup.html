<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯 組み合わせを決める</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
<style>
  .decide-tabs{display:flex; gap:8px; margin-bottom:14px;}
  .decide-tabs button{flex:1; margin-top:0;}
  .avatar{
    width:26px; height:26px; border-radius:50%; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900;
    color:var(--gold); flex-shrink:0;
  }
  .wheel-stage{display:flex; flex-direction:column; align-items:center; padding:8px 0 4px;}
  .wheel-holder{position:relative; width:260px; height:260px; margin:0 auto;}
  .pointer{
    position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:0; height:0;
    border-left:14px solid transparent; border-right:14px solid transparent; border-top:22px solid var(--gold);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); z-index:5;
  }
  canvas#wheel{border-radius:50%; box-shadow:0 0 0 4px #0d0a14, 0 0 0 6px var(--gold-dim), 0 10px 30px rgba(0,0,0,.5);}
  .wheel-center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:60px;
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #3a2c14, #14100a); border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; z-index:4; font-size:20px;
    box-shadow:0 0 14px rgba(232,179,76,.4);
  }
  .picked-banner{
    margin-top:16px; text-align:center; min-height:34px; font-family:'Cinzel','Noto Serif JP',serif;
    font-size:19px; font-weight:900; color:var(--gold); text-shadow:0 0 12px rgba(232,179,76,.5);
  }
  .picked-banner.seed{
    color:#fff2da; text-shadow:0 0 22px rgba(232,179,76,.95), 0 0 40px rgba(255,106,43,.6);
    animation:atsuSeedPulse 650ms ease-in-out 2;
  }
  @keyframes atsuSeedPulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.16);} }
  .seed-particle{
    position:fixed; font-size:22px; pointer-events:none; z-index:2147483000;
    animation:atsuSeedFly 900ms ease-out forwards;
  }
  @keyframes atsuSeedFly{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15); opacity:0; }
  }
  .order-list{margin-top:14px; display:flex; flex-direction:column; gap:6px;}
  .order-item{
    display:flex; align-items:center; gap:8px; background:#0d0a14; border:1px solid var(--line);
    border-radius:10px; padding:9px 10px; font-size:13px; touch-action:pan-y;
  }
  .order-item.dragging{ box-shadow:0 8px 22px rgba(0,0,0,.5); border-color:var(--ember2); z-index:20; position:relative; }
  .order-item .drag-handle{
    flex-shrink:0; width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:18px; cursor:grab; touch-action:none; border-radius:6px;
  }
  .order-item .drag-handle:active{ cursor:grabbing; background:rgba(255,255,255,.08); }
  .order-item .idx{font-family:'JetBrains Mono',monospace; color:var(--ember2); width:20px; text-align:right; font-size:12px; flex-shrink:0;}
  .order-item .nm-edit{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:6px 4px; border-radius:6px; cursor:text;}
  .order-item .nm-edit:active{ background:rgba(255,255,255,.08); }
  .order-item .nm-edit-input{
    flex:1; min-width:0; background:#161320; border:1px solid var(--ember2); color:var(--cream);
    border-radius:6px; padding:5px 8px; font-size:13px; font-family:'Noto Sans JP',sans-serif;
  }
  .order-item .cam{font-size:12px; opacity:.8; flex-shrink:0;}

  .manual-seed-label{font-size:12px; font-weight:900; color:var(--gold); margin:14px 0 8px; letter-spacing:.04em;}
  .seed-chip-list{display:flex; flex-wrap:wrap; gap:8px;}
  .seed-chip{
    background:#161320; border:1px solid var(--line); color:var(--cream); border-radius:999px;
    padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .seed-chip.active{ background:linear-gradient(90deg,rgba(232,179,76,.32),rgba(232,179,76,.1)); border-color:var(--gold-dim); color:var(--gold); }

  .pairing-list{display:flex; flex-direction:column; gap:10px;}
  .pair-card{background:#0d0a14; border:1px solid var(--line); border-radius:12px; padding:10px;}
  .pair-row{display:flex; align-items:center; gap:8px;}
  .pair-slot{
    flex:1; display:flex; align-items:center; gap:4px; min-width:0; background:#161320; border:1px solid var(--line);
    border-radius:10px; padding:8px 6px;
  }
  .pair-slot.bye{ color:var(--muted); font-style:italic; justify-content:center; }
  .pair-slot.pending{ color:var(--muted); justify-content:center; letter-spacing:.05em; }
  .pair-slot .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:text; padding:3px 2px; border-radius:6px;}
  .pair-slot .nm:active{ background:rgba(255,255,255,.1); }
  .pair-slot .cam-mark{font-size:11px; opacity:.8; flex-shrink:0;}
  .pair-vs{color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; flex-shrink:0;}
  .drag-handle-sm{
    flex-shrink:0; width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:16px; cursor:grab; touch-action:none;
  }
  .pair-slot.forced{ border-color:#7a2c2c; box-shadow:0 0 0 1px #7a2c2c inset; }
  .pair-slot.drop-target{ background:rgba(255,106,43,.28); outline:2px solid var(--ember2); outline-offset:-2px; }
  .pair-slot.dragging-slot{ box-shadow:0 10px 26px rgba(0,0,0,.6); z-index:30; position:relative; }
  @keyframes atsuFlash{ 0%{box-shadow:0 0 0 0 rgba(255,106,43,.6);} 100%{box-shadow:0 0 0 10px rgba(255,106,43,0);} }
  .flash-highlight{ animation:atsuFlash 1s ease-out; border-color:var(--ember2) !important; }
  .warn-box{
    margin-top:14px; background:#241214; border:1px solid #5a2222; border-radius:10px; padding:10px 12px;
    font-size:12px; color:#ffb3b3; line-height:1.8;
  }
</style>
</head>
<body>
<a class="back-link" href="index.html">‹ トップへ</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">🎲</div>
    <h1>組み合わせを決める</h1>
    <div class="sub">MATCHUP</div>
  </header>

  <section class="panel">
    <h2><span class="num">01</span> 参加者</h2>
    <div id="peopleSummary"></div>
  </section>

  <section class="panel" id="decideSection" style="display:none;">
    <h2><span class="num">02</span> 組み合わせの決め方</h2>
    <div class="decide-tabs" id="decideModeTabs"></div>

    <div id="rouletteBox">
      <div class="wheel-stage">
        <div class="wheel-holder">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
          <div class="wheel-center">🐾</div>
        </div>
        <div class="picked-banner" id="pickedBanner">&nbsp;</div>
        <div class="row" style="justify-content:center;">
          <button class="btn btn-gold" id="spinBtn">ルーレットを回す</button>
        </div>
      </div>
    </div>

    <div id="manualBox" style="display:none;"></div>

    <div class="row">
      <button class="btn btn-primary" id="instantAutoBtn">⚡ ワンタップで自動抽選</button>
      <button class="btn btn-ghost" id="resetOrderBtn">🔄 引き直す</button>
    </div>
  </section>

  <section class="panel" id="pairingPanel">
    <h2><span class="num">03</span> 組み合わせ</h2>
    <p class="hint" id="pairingHint">ルーレット・自動抽選で組み合わせが決まると、ここに表示されます。名前をタップすると直接書き換えられ、⠿をドラッグすると別の枠と入れ替えられます。</p>
    <div id="pairingArea" class="pairing-list"></div>
  </section>

  <section class="panel" id="goToBracketSection" style="display:none;">
    <div class="empty-state" id="startedNotice" style="display:none; padding:6px 4px 18px;">対戦はもう始まっています。組み合わせの変更はできません。</div>
    <a class="btn btn-gold" style="width:100%;" href="bracket.html">🏆 対戦表を見る・対戦を進める →</a>
  </section>

  <footer class="note">参加者・大会・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
  <datalist id="rosterCandidates"></datalist>
</div>

<script src="tap-ripple.js"></script>
<script src="atsucup-core.js"></script>
<script>
(function(){
  "use strict";
  const state = AtsuCup.state;
  const escapeHtml = AtsuCup.escapeHtml;
  AtsuCup.restore();

  // 組み合わせの名前を書き換える際、登録済みの参加者を候補として選べるようにする
  document.getElementById('rosterCandidates').innerHTML =
    state.roster.map(n=>`<option value="${escapeHtml(n)}">`).join('');

  let decideMode = 'roulette';
  let manualPairOrder = null; // 対戦順(上から2人ずつ組む対象、シードに選んだ人は含まない)
  let manualSeeds = [];       // シード(不戦勝)に指定した人

  // 既に組み合わせが決まっている場合、そのBYE(不戦勝)を初期シードとして引き継ぐ
  function flattenSeeds(){
    if(state.matches.length){
      const seeds = [];
      state.matches[0].forEach(m=>{ if(m.b === null && m.a) seeds.push(m.a); });
      return seeds;
    }
    return [];
  }

  function initials(name){ return (name||'').trim().charAt(0) || '?'; }

  /* ---------- 参加者サマリー ---------- */
  function renderPeopleSummary(){
    const box = document.getElementById('peopleSummary');
    if(!state.people.length){
      box.innerHTML = `<div class="empty-state"><span class="big">🙋</span>参加者が選ばれていません。</div>
        <a class="btn btn-primary" style="width:100%;" href="entry.html">参加者登録へ</a>`;
      return;
    }
    const rec = state.people.filter(p=>p.rec).length;
    box.innerHTML = `
      <span class="count-badge">参加: ${state.people.length}人</span>
      <span class="count-badge muted2">📹 撮影OK: ${rec}人</span>
      <span class="count-badge muted2">🚫 撮影不可: ${state.people.length-rec}人</span>
      <div class="row"><a class="btn btn-ghost" href="entry.html">参加者を編集する</a></div>
    `;
  }

  /* ---------- 組み合わせの決め方 ---------- */
  function flattenOrder(){
    if(state.matches.length){
      const names = [];
      state.matches[0].forEach(m=>{ if(m.a) names.push(m.a); if(m.b) names.push(m.b); });
      if(names.length) return names;
    }
    return state.people.map(p=>p.name);
  }

  function renderDecideModeTabs(){
    document.getElementById('decideModeTabs').innerHTML = `
      <button class="btn ${decideMode==='roulette'?'btn-gold':'btn-ghost'}" id="modeRouletteBtn">🎡 ルーレット</button>
      <button class="btn ${decideMode==='manual'?'btn-gold':'btn-ghost'}" id="modeManualBtn">✋ 手動で決める</button>
    `;
    document.getElementById('modeRouletteBtn').addEventListener('click', ()=>{
      decideMode = 'roulette'; manualPairOrder = null; manualSeeds = [];
      document.getElementById('rouletteBox').style.display = 'block';
      document.getElementById('manualBox').style.display = 'none';
      renderDecideModeTabs();
    });
    document.getElementById('modeManualBtn').addEventListener('click', ()=>{
      decideMode = 'manual';
      const seeds = flattenSeeds();
      manualSeeds = seeds;
      manualPairOrder = flattenOrder().filter(n=>!seeds.includes(n));
      document.getElementById('rouletteBox').style.display = 'none';
      document.getElementById('manualBox').style.display = 'block';
      renderDecideModeTabs();
      renderManualEditor();
    });
  }

  function renderManualEditor(){
    const manualBox = document.getElementById('manualBox');
    const recMap = AtsuCup.recMapOf();
    const total = manualPairOrder.length + manualSeeds.length;
    const size = AtsuCup.nextPow2(total);
    const byeCount = size - total;
    const seedDone = manualSeeds.length === byeCount;
    const allNames = manualPairOrder.concat(manualSeeds);

    manualBox.innerHTML = `
      ${byeCount>0 ? `
        <div class="manual-seed-label">🌱 シード(不戦勝)を選ぶ <span class="count-badge ${seedDone?'':'muted2'}" style="margin:0;">${manualSeeds.length}/${byeCount}人</span></div>
        <p class="hint" style="margin-top:2px;">タップでシード(不戦勝)に指定できます。対戦をせずに次に進める人数分(${byeCount}人)選んでください。</p>
        <div class="seed-chip-list" id="seedChipList">
          ${allNames.map(name=>{
            const isSeed = manualSeeds.includes(name);
            return `<button type="button" class="seed-chip ${isSeed?'active':''}" data-seedtoggle="${escapeHtml(name)}">${isSeed?'🌱 ':''}${escapeHtml(name)}</button>`;
          }).join('')}
        </div>
      ` : ''}
      <p class="hint" style="margin-top:14px;">⠿を長押ししてドラッグすると順番を並べ替えられます。名前をタップすると直接書き換えられます。上から2人ずつ対戦になります。</p>
      <div class="order-list" id="manualOrderList">
        ${manualPairOrder.map((name,i)=>{
          return `<div class="order-item" data-idx="${i}">
            <span class="drag-handle">⠿</span>
            <span class="idx">${i+1}</span>
            <span class="nm-edit" data-edit="${escapeHtml(name)}">${escapeHtml(name)}</span>
            <span class="cam">${recMap[name]?'📹':'🚫'}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="row">
        <button class="btn btn-primary" id="applyManualBtn" ${seedDone?'':'disabled'}>${seedDone ? 'この組み合わせで決定する' : `あとシードを${byeCount-manualSeeds.length}人選んでください`}</button>
      </div>
    `;

    if(byeCount>0){
      manualBox.querySelectorAll('[data-seedtoggle]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const name = btn.dataset.seedtoggle;
          if(manualSeeds.includes(name)){
            manualSeeds = manualSeeds.filter(n=>n!==name);
            manualPairOrder.push(name);
          }else{
            if(manualSeeds.length >= byeCount) return;
            manualPairOrder = manualPairOrder.filter(n=>n!==name);
            manualSeeds.push(name);
          }
          renderManualEditor();
        });
      });
    }

    manualBox.querySelectorAll('[data-edit]').forEach(span=>{
      span.addEventListener('click', ()=>{
        const oldName = span.dataset.edit;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'nm-edit-input';
        input.value = oldName;
        span.replaceWith(input);
        input.focus();
        input.select();
        let done = false;
        const commit = ()=>{
          if(done) return;
          done = true;
          const val = input.value.trim();
          if(val && val !== oldName){
            const pi = manualPairOrder.indexOf(oldName);
            if(pi>=0) manualPairOrder[pi] = val;
            const si = manualSeeds.indexOf(oldName);
            if(si>=0) manualSeeds[si] = val;
          }
          renderManualEditor();
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
      });
    });

    const listEl = document.getElementById('manualOrderList');
    listEl.querySelectorAll('.order-item').forEach(row=>{
      const handle = row.querySelector('.drag-handle');
      handle.addEventListener('pointerdown', (e)=>{
        e.preventDefault();
        const startIdx = +row.dataset.idx;
        let curIdx = startIdx;
        const startY = e.clientY;
        const rows = Array.from(listEl.children);
        const rowStep = rows.length>1 ? (rows[1].offsetTop - rows[0].offsetTop) : row.offsetHeight;
        row.classList.add('dragging');
        row.setPointerCapture(e.pointerId);

        function onMove(ev){
          const dy = ev.clientY - startY;
          const steps = Math.round(dy / rowStep);
          const newIdx = Math.max(0, Math.min(manualPairOrder.length-1, startIdx + steps));
          row.style.transform = `translateY(${dy - (newIdx-startIdx)*rowStep}px)`;
          if(newIdx !== curIdx){
            const item = manualPairOrder.splice(curIdx,1)[0];
            manualPairOrder.splice(newIdx,0,item);
            const others = Array.from(listEl.children).filter(el=>el!==row);
            const refEl = others[newIdx] || null;
            if(refEl) listEl.insertBefore(row, refEl);
            else listEl.appendChild(row);
            curIdx = newIdx;
          }
        }
        function onUp(){
          row.style.transform = '';
          row.classList.remove('dragging');
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          renderManualEditor();
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    });

    const applyBtn = document.getElementById('applyManualBtn');
    applyBtn.addEventListener('click', ()=>{
      if(manualSeeds.length !== byeCount) return;
      state.matches = [AtsuCup.buildRound1Manual(manualPairOrder.concat(manualSeeds), manualSeeds)];
      state.order = [...manualSeeds, ...manualPairOrder];
      state.remaining = [];
      state.thirdPlaceMatch = null;
      state.winnerName = "";
      manualPairOrder = null;
      manualSeeds = [];
      AtsuCup.persist();
      decideMode = 'roulette';
      document.getElementById('rouletteBox').style.display = 'block';
      document.getElementById('manualBox').style.display = 'none';
      renderDecideModeTabs();
      refreshUI();
    });
  }

  document.getElementById('instantAutoBtn').addEventListener('click', ()=>{
    if(!state.people.length) return;
    AtsuCup.resetDownstream(); // 撮影不可同士を避けつつ、新しくシャッフルして組む
    state.remaining = [];
    state.order = state.people.map(p=>p.name);
    AtsuCup.persist();
    pickedBanner.innerHTML = "&nbsp;";
    refreshUI();
  });
  document.getElementById('resetOrderBtn').addEventListener('click', ()=>{
    AtsuCup.resetDownstream();
    pickedBanner.innerHTML = "&nbsp;";
    refreshUI();
  });

  /* ---------- ルーレット ---------- */
  const wheelCanvas = document.getElementById("wheel");
  const ctx = wheelCanvas.getContext("2d");
  const pickedBanner = document.getElementById("pickedBanner");
  const spinBtn = document.getElementById("spinBtn");
  const WHEEL_COLORS = ["#ff6a2b","#e8b34c","#7c4dff","#2bc9a0","#ff4d94","#4fb0e8","#a8e83b","#ff9145"];
  let currentRotation = 0;
  let spinning = false;

  function drawWheel(){
    const list = state.remaining.length ? state.remaining : ["参加者を登録してください"];
    const n = list.length;
    const R = wheelCanvas.width/2;
    ctx.clearRect(0,0,wheelCanvas.width,wheelCanvas.height);
    ctx.save();
    ctx.translate(R,R);
    ctx.rotate(currentRotation);
    const seg = (Math.PI*2)/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,R-4, i*seg, (i+1)*seg);
      ctx.closePath();
      ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
      ctx.fill();
      ctx.save();
      ctx.rotate(i*seg + seg/2);
      ctx.textAlign = "right";
      ctx.fillStyle = "#160f08";
      ctx.font = "bold 13px 'Noto Sans JP', sans-serif";
      const label = list[i].length > 8 ? list[i].slice(0,7)+"…" : list[i];
      ctx.fillText(label, R-16, 5);
      ctx.restore();
    }
    ctx.restore();
  }

  function spawnSeedParticles(){
    const holder = document.querySelector('.wheel-holder');
    if(!holder) return;
    const rect = holder.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const emojis = ['🎉','✨','⭐','🎊'];
    for(let i=0;i<10;i++){
      const el = document.createElement('span');
      el.className = 'seed-particle';
      el.textContent = emojis[i % emojis.length];
      const angle = Math.random()*Math.PI*2;
      const dist = 80 + Math.random()*110;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      el.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 950);
    }
  }

  function easeOutBackSpin(t, s){
    const p = t - 1;
    return 1 + (s + 1) * p * p * p + s * p * p;
  }

  // 引いた人が対戦表のどの枠に入ったかを見つけ、その場でハイライト+スクロールして視覚的に分かるようにする
  function findPairSlotOf(name){
    if(!state.matches.length) return null;
    for(let i=0;i<state.matches[0].length;i++){
      const m = state.matches[0][i];
      if(m.a===name) return {m:i, side:'a'};
      if(m.b===name) return {m:i, side:'b'};
    }
    return null;
  }
  function flashPickedSlot(picked){
    renderPairingPreview();
    const pos = findPairSlotOf(picked);
    if(!pos) return;
    const el = document.querySelector(`.pair-slot[data-m="${pos.m}"][data-side="${pos.side}"]`);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.classList.remove('flash-highlight');
    void el.offsetWidth; // reflow でアニメーションを再トリガー
    el.classList.add('flash-highlight');
  }

  spinBtn.addEventListener("click", ()=>{
    if(spinning) return;
    if(!state.remaining.length){
      if(!state.people.length){ alert("先に参加者を登録してください。"); return; }
      return;
    }
    document.getElementById('rouletteBox').scrollIntoView({behavior:'smooth', block:'center'});
    spinning = true;
    spinBtn.disabled = true;
    const n = state.remaining.length;
    const seg = (Math.PI*2)/n;
    const winnerIdx = Math.floor(Math.random()*n);
    const targetSegCenter = winnerIdx*seg + seg/2;
    const spinDir = Math.random() < 0.3 ? -1 : 1;
    const extraSpins = 4 + Math.random()*4;
    const backStrength = 0.7 + Math.random()*1.3;
    const duration = 2600 + Math.random()*1500;
    const baseRotation = currentRotation + spinDir*extraSpins*Math.PI*2;
    const correction = -Math.PI/2 - (baseRotation % (Math.PI*2)) - targetSegCenter;
    const finalRotation = baseRotation + correction;
    const startRotation = currentRotation;
    const delta = finalRotation - startRotation;
    const startTime = performance.now();
    function frame(now){
      const t = Math.min(1, (now-startTime)/duration);
      currentRotation = startRotation + delta*easeOutBackSpin(t, backStrength);
      drawWheel();
      if(t < 1){ requestAnimationFrame(frame); }
      else{
        currentRotation = finalRotation;
        drawWheel();
        spinning = false;
        spinBtn.disabled = false;
        const picked = state.remaining[winnerIdx];
        state.remaining.splice(winnerIdx,1);
        state.order.push(picked);
        const isSeed = state.matches.length>0 && state.matches[0].some(m=>m.a===picked && m.b===null);
        pickedBanner.classList.toggle('seed', isSeed);
        if(isSeed){
          pickedBanner.textContent = "🎉 シード権獲得！ " + picked;
          spawnSeedParticles();
        }else{
          pickedBanner.textContent = "🎯 " + picked;
        }
        AtsuCup.persist();
        flashPickedSlot(picked);
      }
    }
    requestAnimationFrame(frame);
  });

  /* ---------- 組み合わせプレビュー(ラウンド1のみ・編集可能) ---------- */
  function startEditPairName(m, side){
    const slotEl = document.querySelector(`.pair-slot[data-m="${m}"][data-side="${side}"]`);
    if(!slotEl) return;
    const nmSpan = slotEl.querySelector('.nm');
    if(!nmSpan) return;
    const match = state.matches[0][m];
    const current = side==='a' ? match.a : match.b;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'nm-edit-input';
    input.value = current;
    input.setAttribute('list', 'rosterCandidates'); // 自由入力に加え、登録済み参加者から候補選択もできるようにする
    input.addEventListener('click', ev=> ev.stopPropagation());
    nmSpan.replaceWith(input);
    input.focus(); input.select();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val){
        if(side==='a') match.a = val; else match.b = val;
        if(match.b === null) match.winner = match.a;
        AtsuCup.persist();
      }
      renderPairingPreview();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  function swapPairSlots(m1, s1, m2, s2){
    if(m1===m2 && s1===s2) return;
    const match1 = state.matches[0][m1];
    const match2 = state.matches[0][m2];
    const tmp = match1[s1];
    match1[s1] = match2[s2];
    match2[s2] = tmp;
    if(match1.b === null) match1.winner = match1.a;
    if(match2.b === null) match2.winner = match2.a;
    AtsuCup.persist();
    renderPairingPreview();
  }

  function attachPairDrag(handleEl){
    handleEl.addEventListener('click', ev=> ev.stopPropagation());
    handleEl.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      const m = +handleEl.dataset.m, side = handleEl.dataset.side;
      const slotEl = handleEl.closest('.pair-slot');
      const startX = e.clientX, startY = e.clientY;
      slotEl.classList.add('dragging-slot');
      slotEl.style.pointerEvents = 'none';
      let dropTarget = null;

      function onMove(ev){
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        slotEl.style.transform = `translate(${dx}px,${dy}px)`;
        const elUnder = document.elementFromPoint(ev.clientX, ev.clientY);
        document.querySelectorAll('.pair-slot.drop-target').forEach(x=>x.classList.remove('drop-target'));
        const targetSlot = elUnder ? elUnder.closest('.pair-slot[data-m]') : null;
        if(targetSlot && targetSlot!==slotEl){
          dropTarget = targetSlot;
          targetSlot.classList.add('drop-target');
        }else{
          dropTarget = null;
        }
      }
      function onUp(){
        slotEl.style.transform = '';
        slotEl.style.pointerEvents = '';
        slotEl.classList.remove('dragging-slot');
        document.querySelectorAll('.pair-slot.drop-target').forEach(x=>x.classList.remove('drop-target'));
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        if(dropTarget){
          swapPairSlots(m, side, +dropTarget.dataset.m, dropTarget.dataset.side);
        }
      }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  }

  function pairSlotHtml(name, m, side, recMap, isForced){
    if(name === null){
      return `<div class="pair-slot bye">BYE (不戦勝)</div>`;
    }
    if(!AtsuCup.isRevealed(name)){
      return `<div class="pair-slot pending"><span>🎲 ？？？</span></div>`;
    }
    return `<div class="pair-slot ${isForced?'forced':''}" data-m="${m}" data-side="${side}">
      <span class="nm" data-editname>${escapeHtml(name)}</span>
      <span class="cam-mark">${recMap[name]?'📹':'🚫'}</span>
      <span class="drag-handle-sm" data-draghandle data-m="${m}" data-side="${side}">⠿</span>
    </div>`;
  }

  function renderPairingPreview(){
    const area = document.getElementById('pairingArea');
    const hint = document.getElementById('pairingHint');
    const goSection = document.getElementById('goToBracketSection');
    const startedNotice = document.getElementById('startedNotice');
    const hasPairing = state.matches.length>0 && state.matches[0].length>0;

    goSection.style.display = hasPairing ? 'block' : 'none';
    startedNotice.style.display = hasPairing && !AtsuCup.bracketNotStarted() ? 'block' : 'none';

    if(!state.people.length){
      area.innerHTML = `<div class="empty-state"><span class="big">🙋</span>参加者がいません。<br>「参加者を編集する」から選んでください。</div>`;
      hint.style.display = 'none';
      return;
    }
    if(!AtsuCup.bracketNotStarted()){
      area.innerHTML = '';
      hint.style.display = 'none';
      return;
    }
    hint.style.display = 'block';
    if(!hasPairing){
      area.innerHTML = `<div class="empty-state"><span class="big">🌀</span>まだ組み合わせがありません。<br>上で組み合わせの決め方を選んでください。</div>`;
      return;
    }

    const recMap = AtsuCup.recMapOf();
    const round = state.matches[0];
    let html = round.map((m,i)=>{
      const isForced = m.a && m.b && AtsuCup.isRevealed(m.a) && AtsuCup.isRevealed(m.b) && !recMap[m.a] && !recMap[m.b];
      return `<div class="pair-card">
        <div class="pair-row">
          ${pairSlotHtml(m.a, i, 'a', recMap, isForced)}
          <span class="pair-vs">VS</span>
          ${pairSlotHtml(m.b, i, 'b', recMap, isForced)}
        </div>
      </div>`;
    }).join('');

    const forced = AtsuCup.forcedPairsList();
    if(forced.length){
      html += `<div class="warn-box">⚠️ 撮影OKの人が足りず、以下は撮影不可同士の対戦になっています:<br>` +
        forced.map(f=>`・${escapeHtml(f.a)} vs ${escapeHtml(f.b)}`).join("<br>") + `</div>`;
    }

    area.innerHTML = html;
    area.querySelectorAll('[data-editname]').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        const slot = el.closest('.pair-slot');
        startEditPairName(+slot.dataset.m, slot.dataset.side);
      });
    });
    area.querySelectorAll('[data-draghandle]').forEach(el=> attachPairDrag(el));
  }

  /* ---------- 全体の再描画 ---------- */
  function renderDecideVisibility(){
    const decideSection = document.getElementById('decideSection');
    const show = state.people.length>0 && AtsuCup.bracketNotStarted();
    decideSection.style.display = show ? 'block' : 'none';
  }

  function refreshUI(){
    renderPeopleSummary();
    renderDecideVisibility();
    drawWheel();
    renderPairingPreview();
  }

  renderDecideModeTabs();
  refreshUI();
})();
</script>
