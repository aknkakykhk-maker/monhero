<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯 参加者登録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
<style>
  .flow-banner{
    background:linear-gradient(180deg,rgba(255,145,69,.18),rgba(255,106,43,.06)); border:1px solid var(--ember2);
    border-radius:14px; padding:12px 14px; margin-bottom:16px; font-size:12.5px; color:var(--cream); line-height:1.8;
  }
  .selected-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .available-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px;}
  .roster-cell{
    display:flex; align-items:center; gap:6px; min-width:0; background:#0d0a14; border:1.5px solid var(--line);
    border-radius:10px; padding:9px 8px; cursor:pointer;
  }
  .roster-cell.selected{ border-color:var(--ember2); background:linear-gradient(180deg,rgba(255,145,69,.14),rgba(255,106,43,.05)); flex-direction:column; align-items:stretch; gap:6px; }
  .roster-cell .nm{flex:1; min-width:0; font-weight:700; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .roster-cell .cell-actions{ display:flex; align-items:center; gap:6px; }
  .roster-cell .rm{
    flex-shrink:0; background:none; border:1px solid var(--line); border-radius:6px; color:#6b5f82; font-size:11px;
    cursor:pointer; padding:3px 6px; line-height:1;
  }
  .roster-cell .cam-toggle-inline{ flex-shrink:0; padding:2px 6px; font-size:11px; }
  .next-flow-box{ margin-top:20px; }
</style>
</head>
<body>
<a class="back-link" href="index.html">‹ トップへ</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">🙋</div>
    <h1>参加者登録</h1>
    <div class="sub">ENTRY</div>
  </header>

  <div id="flowBanner"></div>

  <section class="panel">
    <h2><span class="num">01</span> 新しい参加者を登録する</h2>
    <p class="hint">1行に1人ずつ名前を入力してください。この端末に保存され、次回以降も一覧から選べます。</p>
    <textarea id="rosterInput" placeholder="名前を入力(1行に1人ずつ)" style="min-height:70px;"></textarea>
    <div class="row">
      <button class="btn btn-primary" id="addToRoster">登録する</button>
    </div>
  </section>

  <section class="panel">
    <h2><span class="num">02</span> 今回参加する人</h2>
    <div id="countBadges"></div>
    <div id="selectedList" style="margin-top:12px;"></div>
  </section>

  <section class="panel">
    <h2><span class="num">03</span> 登録済みの人から追加</h2>
    <p class="hint">タップで今回の大会に追加します。✕で登録者一覧から完全に削除します。</p>
    <div id="availableList"></div>
  </section>

  <div class="next-flow-box" id="nextFlowBox" style="display:none;">
    <a class="btn btn-gold" style="width:100%;" href="matchup.html">次へ: 組み合わせを決める →</a>
  </div>

  <footer class="note">参加者・大会・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
</div>

<script src="tap-ripple.js"></script>
<script src="atsucup-core.js"></script>
<script>
(function(){
  "use strict";
  const state = AtsuCup.state;
  const escapeHtml = AtsuCup.escapeHtml;
  AtsuCup.restore();

  const rosterInput = document.getElementById("rosterInput");
  const countBadges = document.getElementById("countBadges");
  const selectedList = document.getElementById("selectedList");
  const availableList = document.getElementById("availableList");
  const nextFlowBox = document.getElementById("nextFlowBox");

  if(new URLSearchParams(location.search).get('flow') === 'new'){
    document.getElementById('flowBanner').innerHTML = `<div class="flow-banner">✅ 大会を作成しました。続けてこの大会に参加する人を選んでください。選び終わったら下の「次へ」から組み合わせを決められます。</div>`;
  }

  function renderBadges(){
    const total = state.people.length;
    const rec = state.people.filter(p=>p.rec).length;
    const norec = total - rec;
    countBadges.innerHTML = `
      <span class="count-badge">選択中: ${total}人</span>
      <span class="count-badge muted2">📹 撮影OK: ${rec}人</span>
      <span class="count-badge muted2">🚫 撮影不可: ${norec}人</span>`;
  }

  function toggleSelect(name){
    const idx = state.people.findIndex(p=>p.name===name);
    if(idx>=0){ state.people.splice(idx,1); }
    else{ state.people.push({name, rec:true}); }
    AtsuCup.resetDownstream();
    renderAll();
  }

  function renderAll(){
    renderBadges();
    nextFlowBox.style.display = state.people.length ? 'block' : 'none';

    // 今回参加する人(選択中)・2列表示
    selectedList.className = '';
    selectedList.innerHTML = "";
    if(!state.people.length){
      selectedList.innerHTML = `<div class="empty-state" style="padding:14px 4px;">まだ選ばれていません。下の「登録済みの人から追加」からタップして選んでください。</div>`;
    }else{
      selectedList.className = 'selected-grid';
      state.people.forEach(person=>{
        const cell = document.createElement('div');
        cell.className = 'roster-cell selected';
        cell.innerHTML = `
          <span class="nm">${escapeHtml(person.name)}</span>
          <div class="cell-actions">
            <button class="cam-toggle-inline ${person.rec?'rec-yes':'rec-no'}" data-cam="${escapeHtml(person.name)}">${person.rec?'📹':'🚫'}</button>
            <button class="rm" data-toggle="${escapeHtml(person.name)}" title="今回の参加から外す">外す</button>
          </div>
        `;
        selectedList.appendChild(cell);
      });
    }

    // 登録済みだが今回は未選択の人・3列表示
    const unselected = state.roster.filter(name => !state.people.some(p=>p.name===name));
    availableList.className = '';
    availableList.innerHTML = "";
    if(!state.roster.length){
      availableList.innerHTML = `<div class="empty-state" style="padding:14px 4px;">まだ登録者がいません。上のフォームから名前を登録してください。</div>`;
    }else if(!unselected.length){
      availableList.innerHTML = `<div class="empty-state" style="padding:14px 4px;">登録済みの人は全員選択中です。</div>`;
    }else{
      availableList.className = 'available-grid';
      unselected.forEach(name=>{
        const cell = document.createElement('div');
        cell.className = 'roster-cell';
        cell.dataset.select = name;
        cell.innerHTML = `
          <span class="nm">${escapeHtml(name)}</span>
          <button class="rm" data-roster-rm="${escapeHtml(name)}" title="登録者一覧から削除">✕</button>
        `;
        availableList.appendChild(cell);
      });
    }

    document.querySelectorAll('[data-select]').forEach(el=>{
      el.addEventListener('click', ()=> toggleSelect(el.dataset.select));
    });
    document.querySelectorAll('[data-toggle]').forEach(el=>{
      el.addEventListener('click', (ev)=>{ ev.stopPropagation(); toggleSelect(el.dataset.toggle); });
    });
    document.querySelectorAll('[data-cam]').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        const person = state.people.find(p=>p.name===el.dataset.cam);
        if(person){ person.rec = !person.rec; AtsuCup.persist(); renderAll(); }
      });
    });
    document.querySelectorAll('[data-roster-rm]').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        const name = el.dataset.rosterRm;
        state.roster = state.roster.filter(n=>n!==name);
        state.people = state.people.filter(p=>p.name!==name);
        AtsuCup.resetDownstream();
        renderAll();
      });
    });
  }

  document.getElementById("addToRoster").addEventListener("click", ()=>{
    const lines = rosterInput.value.split("\n").map(s=>s.trim()).filter(Boolean);
    if(!lines.length){ alert("名前を入力してください。"); return; }
    const uniqNew = [...new Set(lines)].filter(n=>!state.roster.includes(n));
    state.roster = [...state.roster, ...uniqNew];
    uniqNew.forEach(name=>{
      if(!state.people.some(p=>p.name===name)) state.people.push({name, rec:true});
    });
    rosterInput.value = "";
    AtsuCup.resetDownstream();
    renderAll();
  });

  renderAll();
})();
</script>
</body>
</html>
