<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
</head>
<body>
<a class="back-link" href="../index.html">‹ 戻る</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">👑</div>
    <h1>あつ杯</h1>
    <div class="sub">LINE monster farm・tournament</div>
  </header>

  <section class="panel" id="currentBox"></section>

  <footer class="note">大会・参加者・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
</div>

<script src="tap-ripple.js"></script>
<script>
(function(){
  "use strict";
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const box = document.getElementById('currentBox');
  try{
    const raw = localStorage.getItem('atsucup:state:v2');
    const state = raw ? JSON.parse(raw) : null;
    const meta = state && state.tournamentMeta;
    if(!meta || !meta.title){
      box.innerHTML = `<div class="empty-state"><span class="big">🏆</span>まだ大会が作成されていません。</div>
        <a class="btn btn-primary" style="width:100%;" href="admin.html">大会管理を開く</a>`;
    }else{
      const badge = state.winnerName
        ? `<span class="status-badge done">優勝者決定</span>`
        : `<span class="status-badge open">進行中</span>`;
      box.innerHTML = `
        ${badge}
        ${meta.posterUrl ? `<img class="poster-img" src="${escapeHtml(meta.posterUrl)}" alt="poster">` : ''}
        <div class="cur-title">${escapeHtml(meta.title)}</div>
        ${meta.details ? `<div class="cur-details">${escapeHtml(meta.details)}</div>` : ''}
        ${state.winnerName ? `<div class="cur-line champ">👑 優勝: ${escapeHtml(state.winnerName)}</div>` : ''}
        ${(state.thirdPlaceMatch && state.thirdPlaceMatch.winner) ? `<div class="cur-line third">🥉 3位: ${escapeHtml(state.thirdPlaceMatch.winner)}</div>` : ''}
        <a class="btn btn-primary" style="width:100%;" href="admin.html">大会管理を開く</a>
      `;
    }
  }catch(e){
    box.innerHTML = `<div class="empty-state"><span class="big">⚠️</span>読み込みに失敗しました。</div>
      <a class="btn btn-primary" style="width:100%;" href="admin.html">大会管理を開く</a>`;
  }
})();
</script>
</body>
</html>
