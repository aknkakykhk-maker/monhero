<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>あつ杯管理ツール</title>
<meta name="theme-color" content="#000000">
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; }
  body {
    height:100dvh; box-sizing:border-box;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%, #1f1305 0%, #000000 65%);
    color:#fff; text-align:center; padding-left:24px; padding-right:24px;
  }
  a.back { position:fixed; top:calc(16px + env(safe-area-inset-top)); left:16px; color:rgba(255,255,255,0.5); font:900 12px sans-serif; text-decoration:none; padding:8px 14px; border:1px solid rgba(255,255,255,0.15); border-radius:999px; }
  .icon { font-size:48px; }
  h1 { font-size:20px; font-weight:900; margin:0; }
  p { color:rgba(255,255,255,0.5); font-size:12px; margin:0; max-width:320px; line-height:1.6; }
</style>
</head>
<body>
  <a class="back" href="../index.html">‹ 戻る</a>
  <div class="icon">🏆</div>
  <h1>あつ杯管理ツール</h1>
  <p>準備中です。トーナメント表・組み合わせルーレットなどの機能をここに実装していきます。</p>
</body>
</html>
