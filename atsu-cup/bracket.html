<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯 対戦表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
<style>
  /* このページだけ左右の余白と縦の隙間を詰めて、トーナメント表により多くのスペースを使う */
  .wrap{ padding-left:8px; padding-right:8px; padding-top:6px; }
  header.top{ padding:4px 6px 2px; }
  .crown-mark{ font-size:17px; }
  header.top h1{ font-size:18px; margin:2px 0 0; }
  header.top .sub{ font-size:9px; }
  #treePanel{ padding:8px 6px 14px; }
  #treePanel h2{ margin-bottom:2px; }
  .tree-title{font-family:'Cinzel','Noto Serif JP',serif; font-weight:900; font-size:14px; color:var(--gold); margin-bottom:2px; padding:0 10px;}
  #treePanel > p.hint{ margin:0 0 6px !important; font-size:10.5px; }
  #jumpRow{ margin-bottom:6px !important; }
  #jumpRow .btn{ padding:8px 14px; font-size:12.5px; }
  .tree-scroll{
    overflow-x:auto; overflow-y:auto; -webkit-overflow-scrolling:touch; border-radius:14px; border:1px solid var(--line);
    background:#0a0810; padding:8px 0; max-height:84vh;
  }
  .tree-scroll svg{ display:block; width:max(100%, var(--svg-natural-w, 0px)); height:auto; }
  .tree-tap{ cursor:pointer; }
  .tree-tap rect{ transition: fill .12s ease; }
  .tree-tap:active rect{ fill: rgba(232,179,76,.16) !important; }
  .tree-edit-icon, .tree-add-icon{ cursor:pointer; }
  .tree-edit-icon:active, .tree-add-icon:active{ opacity:.5; }
  @keyframes treeTapFlash{ 0%{ fill: rgba(232,179,76,.55); } 100%{ fill: transparent; } }
  .tree-tap.tree-flash rect{ animation: treeTapFlash 1.1s ease-out; }
  .tree-edit-input{
    width:100%; height:100%; box-sizing:border-box; font-size:12px; padding:3px 5px;
    background:#0d0a14; border:1px solid var(--ember2); color:var(--cream); border-radius:5px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .tree-hint{ font-size:11px; color:var(--muted); margin:8px 2px 0; }
  .avatar{
    width:30px; height:30px; border-radius:50%; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900;
    color:var(--gold); flex-shrink:0;
  }
  .match-pick-row{display:flex; flex-direction:column; gap:6px;}
  .pick-btn{
    display:flex; align-items:center; gap:6px; min-width:0; background:#161320; border:1px solid var(--line);
    border-radius:10px; color:var(--cream); font-weight:700; font-size:16px; padding:4px;
  }
  .pick-main{ flex:1; display:flex; align-items:center; gap:10px; min-width:0; padding:9px 8px; cursor:pointer; border-radius:8px; }
  .pick-main:active{ background:rgba(255,255,255,.08); }
  .pick-btn span.nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pick-btn.winner{ background:linear-gradient(90deg,rgba(232,179,76,.28),rgba(232,179,76,.08)); border-color:var(--gold-dim); color:var(--gold); font-weight:900; }
  .pick-btn.forced{ border-color:#7a2c2c; }
  .pick-edit-btn{
    flex-shrink:0; background:none; border:1px solid var(--line); border-radius:6px; color:var(--muted);
    font-size:14px; padding:0 10px; cursor:pointer; align-self:center; height:34px;
  }
  .nm-edit-input{
    flex:1; min-width:0; background:#0d0a14; border:1px solid var(--ember2); color:var(--cream);
    border-radius:6px; padding:7px 9px; font-size:15px; font-family:'Noto Sans JP',sans-serif;
  }
  .vs-label{ align-self:center; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; }
  .warn-box{
    margin-top:14px; background:#241214; border:1px solid #5a2222; border-radius:10px; padding:10px 12px;
    font-size:12px; color:#ffb3b3; line-height:1.8;
  }
  .swap-note{
    margin-top:8px; font-size:11.5px; color:#c9b8ff; background:rgba(139,109,255,.12); border:1px solid rgba(139,109,255,.4);
    border-radius:8px; padding:6px 9px; display:flex; align-items:center; gap:6px; font-weight:700;
  }
  .champion-box{
    margin-top:18px; text-align:center; padding:22px 14px; border-radius:14px;
    background:radial-gradient(circle at 50% 0%, rgba(232,179,76,.2), transparent 70%), #14100a; border:1px solid var(--gold-dim);
  }
  .champion-box .label{font-size:11px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase;}
  .champion-box .name{
    font-family:'Cinzel','Noto Serif JP',serif; font-weight:900; font-size:26px; color:var(--gold);
    margin:6px 0 14px; text-shadow:0 0 16px rgba(232,179,76,.5);
  }
  .match-pick-modal{ position:fixed; inset:0; z-index:2147483000; display:flex; align-items:center; justify-content:center; padding:20px; }
  .match-pick-modal-backdrop{ position:absolute; inset:0; background:rgba(0,0,0,.62); backdrop-filter:blur(2px); }
  .match-pick-modal-card{
    position:relative; width:100%; max-width:360px; background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line); border-radius:16px; padding:20px 18px; box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .match-pick-modal-title{
    text-align:center; font-size:11px; letter-spacing:.15em; color:var(--ember2); font-weight:900;
    text-transform:uppercase; margin-bottom:14px;
  }
  .match-pick-modal-row{ display:flex; flex-direction:column; gap:10px; align-items:stretch; }
  .match-pick-modal-row .vs-label{ text-align:center; }
  .modal-pick-btn{
    display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
    background:#161320; border:1px solid var(--line); border-radius:12px; color:var(--cream);
    font-weight:900; font-size:17px; padding:16px 18px; cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  }
  .modal-pick-btn .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modal-pick-btn:active{ background:rgba(255,255,255,.08); }
  .modal-pick-btn.winner{ background:linear-gradient(90deg,rgba(232,179,76,.28),rgba(232,179,76,.08)); border-color:var(--gold-dim); color:var(--gold); }
</style>
</head>
<body>
<a class="back-link" href="index.html">‹ トップへ</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">🏆</div>
    <h1>対戦表</h1>
    <div class="sub">BRACKET</div>
  </header>

  <div id="emptyStateBox"></div>

  <section class="panel" id="treePanel" style="display:none;">
    <h2><span class="num">01</span> トーナメント表</h2>
    <div class="tree-title" id="treeTitle"></div>
    <p class="hint" style="margin:2px 0 8px;">タップで勝敗選択・✏️で名前変更・シード枠の➕で途中参加</p>
    <div class="row" id="jumpRow" style="display:none; margin-bottom:8px;">
      <button class="btn btn-ghost" id="jumpNextBtn" style="width:100%;">🎯 次の対戦へ</button>
    </div>
    <div class="tree-scroll" id="treeScroll"></div>
    <button class="btn btn-ghost" id="saveBracketImgBtn" style="margin-top:12px;">📸 画像で保存</button>
    <div id="noticeArea"></div>
    <div id="thirdPlaceArea"></div>
    <div id="championArea"></div>
  </section>

  <footer class="note">参加者・大会・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
  <datalist id="rosterCandidatesBracket"></datalist>
</div>

<div class="match-pick-modal" id="matchPickModal" style="display:none;">
  <div class="match-pick-modal-backdrop" id="matchPickModalBackdrop"></div>
  <div class="match-pick-modal-card">
    <div class="match-pick-modal-title" id="modalMatchTitle"></div>
    <div class="match-pick-modal-row">
      <button type="button" class="modal-pick-btn" id="modalPickA"></button>
      <span class="vs-label">VS</span>
      <button type="button" class="modal-pick-btn" id="modalPickB"></button>
    </div>
    <button type="button" class="btn btn-ghost" id="modalCancelBtn" style="width:100%; margin-top:12px;">キャンセル</button>
  </div>
</div>

<script src="tap-ripple.js"></script>
<script src="atsucup-core.js"></script>
<script>
(function(){
  "use strict";
  const state = AtsuCup.state;
  const escapeHtml = AtsuCup.escapeHtml;
  AtsuCup.restore();

  // 名前を書き換える際、登録済みの参加者を候補として選べるようにする
  document.getElementById('rosterCandidatesBracket').innerHTML =
    state.roster.map(n=>`<option value="${escapeHtml(n)}">`).join('');

  function initials(name){ return (name||'').trim().charAt(0) || '?'; }
  function truncate(s, n){ return (s && s.length > n) ? s.slice(0,n-1)+'…' : (s||''); }

  const hasPairing = state.matches.length>0 && state.matches[0].length>0 && state.remaining.length===0;

  if(!hasPairing){
    document.getElementById('emptyStateBox').innerHTML = `
      <section class="panel">
        <div class="empty-state"><span class="big">🎲</span>まだ組み合わせが決まっていません。</div>
        <a class="btn btn-primary" style="width:100%;" href="matchup.html">組み合わせを決める →</a>
      </section>
    `;
    return;
  }

  document.getElementById('treePanel').style.display = 'block';
  document.getElementById('treeTitle').textContent = (state.tournamentMeta && state.tournamentMeta.title) || 'あつ杯 トーナメント表';

  /* ---------- 本物のトーナメント表(参加者を縦一列に並べ、線でつなぐ) ---------- */
  // 参加者が多いほど表が縦に長くなりすぎないよう、行の高さの下限・上限を段階的に決める。
  // (leafCountは大会作成時の1回戦の人数で決まり、以降の途中参加等では変わらない)
  const initialLeafCount = state.matches[0] ? state.matches[0].length * 2 : 0;
  const TREE_ROW_MIN_H = initialLeafCount<=8 ? 40 : initialLeafCount<=16 ? 30 : initialLeafCount<=24 ? 22 : 18;
  const TREE_ROW_MAX_H = initialLeafCount<=8 ? 90 : initialLeafCount<=16 ? 60 : initialLeafCount<=24 ? 40 : 26;
  // ヘッダー・見出し・「次の対戦へ」ボタン・下の保存ボタン分の目安の高さ。
  // 人数が少ない大会だと下限の行の高さでは画面の下に余白が余ってしまうため、
  // 実際の画面の高さから逆算し、余っている縦幅をできるだけ行の高さに還元する。
  const TREE_CHROME_RESERVE = 260;
  const treeAvailableH = Math.max(200, window.innerHeight - TREE_CHROME_RESERVE);
  const TREE_ROW_H = initialLeafCount
    ? Math.max(TREE_ROW_MIN_H, Math.min(TREE_ROW_MAX_H, treeAvailableH / initialLeafCount))
    : TREE_ROW_MIN_H;
  const TREE_LABEL_W = 148;
  const TREE_COL_W = 46;

  function leafY(i){ return (i+0.5)*TREE_ROW_H; }
  function jointY(r, i){
    if(r === 0) return (leafY(2*i) + leafY(2*i+1)) / 2;
    return (jointY(r-1, 2*i) + jointY(r-1, 2*i+1)) / 2;
  }
  function colX(r){ return TREE_LABEL_W + (r+1)*TREE_COL_W; }
  function findSrcIndex(round, name){
    if(!round || !name) return -1;
    return round.findIndex(x=>x.winner===name);
  }
  // 勝ち上がった人が次にどの対戦(ラウンド・試合・どちら側)で待っているかを、
  // 実際のデータ(名前の一致)から探す。撮影不可の例外入れ替えが起きていても正しく辿れる。
  function findNextSlot(nextRound, name){
    if(!nextRound || !name) return null;
    for(let idx=0; idx<nextRound.length; idx++){
      if(nextRound[idx].a === name) return {m:idx, side:'a'};
      if(nextRound[idx].b === name) return {m:idx, side:'b'};
    }
    return null;
  }

  // 名前をタップで書き換えるための入力欄を、トーナメント表の該当位置に重ねて表示する場所(x,y,幅,高さ)
  let treeSlotRects = {};
  // 画面表示時にSVGをコンテナ幅いっぱいまで拡大するための、本来の(拡大前の)横幅
  let lastSvgW = 0;

  function buildTreeSVG(interactive){
    treeSlotRects = {};
    const round0 = state.matches[0];
    const leafCount = round0.length * 2;
    const totalRounds = Math.round(Math.log2(leafCount));
    const recMap = AtsuCup.recMapOf();

    const trophyX = colX(totalRounds-1) + TREE_COL_W;
    const svgW = trophyX + 74;
    const svgH = leafCount * TREE_ROW_H;
    lastSvgW = svgW;

    let leavesSvg = '';
    round0.forEach((m,i)=>{
      [[2*i, m.a, false, 'a'], [2*i+1, m.b, m.b===null, 'b']].forEach(([idx, name, bye, side])=>{
        const y = leafY(idx);
        if(bye){
          leavesSvg += `<text x="6" y="${y+5}" font-size="13" font-style="italic" fill="#6b5f82">シード</text>`;
          if(interactive){
            const rh0 = Math.min(32, TREE_ROW_H-2);
            treeSlotRects[`bye_${i}`] = {x:2, y:y-rh0/2, w:TREE_LABEL_W-38, h:rh0};
            leavesSvg += `<text class="tree-add-icon" data-addm="${i}" x="${TREE_LABEL_W-6}" y="${y+5}" font-size="14" text-anchor="end">➕</text>`;
          }
          return;
        }
        const isChamp = !!state.winnerName && name === state.winnerName;
        const rh0 = Math.min(32, TREE_ROW_H-2);
        const rx=2, ry=y-rh0/2, rw=TREE_LABEL_W-38, rh=rh0;
        treeSlotRects[`0_${i}_${side}`] = {x:rx, y:ry, w:rw, h:rh};
        leavesSvg += `<text x="6" y="${y+5}" font-size="13.5" font-weight="${isChamp?'900':'700'}" fill="${isChamp?'#e8b34c':'#f1e6cf'}">${escapeHtml(truncate(name,8))}</text>`;
        leavesSvg += `<text x="${TREE_LABEL_W-30}" y="${y+5}" font-size="11" text-anchor="end">${recMap[name]?'📹':'🚫'}</text>`;
        if(interactive){
          leavesSvg += `<text class="tree-edit-icon" data-editr="0" data-editm="${i}" data-editside="${side}" x="${TREE_LABEL_W-6}" y="${y+5}" font-size="13" text-anchor="end">✏️</text>`;
          leavesSvg += `<g class="tree-tap" data-r="0" data-m="${i}" data-side="${side}"><rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" fill="transparent"/></g>`;
        }
      });
    });

    let linesSvg = '';
    let labelsSvg = '';
    for(let r=0; r<totalRounds; r++){
      const matchCount = leafCount / Math.pow(2, r+1);
      const prevRound = r===0 ? null : state.matches[r-1];
      const stubStartX = r===0 ? TREE_LABEL_W : colX(r-1);
      const jx = colX(r);
      for(let i=0;i<matchCount;i++){
        const m = state.matches[r] && state.matches[r][i];
        let childY0, childY1;
        if(r === 0){
          childY0 = leafY(2*i); childY1 = leafY(2*i+1);
        }else{
          const srcA = m ? findSrcIndex(prevRound, m.a) : -1;
          const srcB = m ? findSrcIndex(prevRound, m.b) : -1;
          childY0 = jointY(r-1, srcA>=0?srcA:2*i);
          childY1 = jointY(r-1, srcB>=0?srcB:2*i+1);
        }
        const midY = (childY0+childY1)/2;
        const outEndX = (r === totalRounds-1) ? trophyX : colX(r+1);

        linesSvg += `<path d="M${stubStartX},${childY0} H${jx}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${stubStartX},${childY1} H${jx}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${jx},${childY0} V${childY1}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${jx},${midY} H${outEndX}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;

        if(m && m.winner){
          const winY = (m.winner === m.a) ? childY0 : childY1;
          const winSide = (m.winner === m.a) ? 'a' : 'b';
          linesSvg += `<path d="M${stubStartX},${winY} H${jx}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;
          linesSvg += `<path d="M${jx},${winY} V${midY}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;
          linesSvg += `<path d="M${jx},${midY} H${outEndX}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;

          // 参考にしたトーナメント表と同じく、各ラウンドの合流点には名前を繰り返し表示せず、
          // 色付きの線だけで勝ち上がりを示す(名前は一番左の本人の欄でのみ表示・編集する)。
          // ただし、進行中でもその場でリネームできるよう、小さな鉛筆アイコンだけは残す。
          treeSlotRects[`${r}_${i}_${winSide}`] = {x:jx+2, y:midY-4, w:TREE_COL_W-8, h:22};
          if(interactive){
            labelsSvg += `<text class="tree-edit-icon" data-editr="${r}" data-editm="${i}" data-editside="${winSide}" x="${jx+4}" y="${midY+13}" font-size="11" opacity="0.85">✏️</text>`;
            const nextSlot = findNextSlot(state.matches[r+1], m.winner);
            if(nextSlot){
              labelsSvg += `<g class="tree-tap" data-r="${r+1}" data-m="${nextSlot.m}" data-side="${nextSlot.side}"><rect x="${jx+2}" y="${midY-16}" width="${TREE_COL_W-8}" height="16" fill="transparent"/></g>`;
            }
          }
        }
      }
    }

    let trophySvg = '';
    if(state.winnerName){
      const finalY = jointY(totalRounds-1, 0);
      trophySvg = `<text x="${trophyX+8}" y="${finalY+8}" font-size="24">🏆</text>`;
    }

    return `<svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="${svgW}" height="${svgH}" fill="#0a0810"/>
      ${linesSvg}
      ${leavesSvg}
      ${labelsSvg}
      ${trophySvg}
    </svg>`;
  }

  // タップで勝敗を決める・鉛筆マークで名前を書き換える、をトーナメント表そのものの上で行えるようにする
  function wireTreeInteractions(){
    document.querySelectorAll('#treeScroll .tree-tap').forEach(el=>{
      el.addEventListener('click', ()=>{
        openMatchPickModal(+el.dataset.r, +el.dataset.m);
      });
    });
    document.querySelectorAll('#treeScroll .tree-edit-icon').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        startEditTreeName(+el.dataset.editr, +el.dataset.editm, el.dataset.editside);
      });
    });
    document.querySelectorAll('#treeScroll .tree-add-icon').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        startAddChallengerTree(+el.dataset.addm);
      });
    });
  }

  // BYE(不戦勝)枠に大会途中の追加参加者を入れ、実際の対戦に変える(トーナメント表そのものの上で行う)
  function startAddChallengerTree(m){
    const rect = treeSlotRects[`bye_${m}`];
    const svgEl = document.querySelector('#treeScroll svg');
    if(!rect || !svgEl) return;
    // 1回戦を残したまま2回戦以降を先に消化できるようになったため、次のラウンドの枠が存在していても
    // まだ何も確定していないことがある。実際に対戦カードや結果が先に進んでいる場合だけ、
    // 気付かないまま消えてしまわないよう事前に確認する
    if(AtsuCup.hasDownstreamProgress(0)){
      const ok = confirm('この不戦勝より先のラウンドに、既に対戦カードや結果が決まっています。\n途中参加者を追加すると、次の対戦以降の結果はいったんリセットされます。よろしいですか?');
      if(!ok) return;
    }
    const already = svgEl.querySelector('foreignObject.tree-edit-fo');
    if(already) already.remove();
    const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
    fo.setAttribute('class', 'tree-edit-fo');
    fo.setAttribute('x', rect.x);
    fo.setAttribute('y', rect.y);
    fo.setAttribute('width', rect.w);
    fo.setAttribute('height', rect.h);
    const input = document.createElementNS('http://www.w3.org/1999/xhtml', 'input');
    input.setAttribute('type', 'text');
    input.setAttribute('class', 'tree-edit-input');
    input.setAttribute('placeholder', '対戦相手の名前');
    input.setAttribute('list', 'rosterCandidatesBracket');
    input.addEventListener('click', ev=> ev.stopPropagation());
    fo.appendChild(input);
    svgEl.appendChild(fo);
    input.focus();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val){ AtsuCup.addChallengerToBye(0, m, val); }
      renderTree();
      renderExtras();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  function startEditTreeName(r, m, side){
    const match = state.matches[r][m];
    if(!match) return;
    const current = side === 'a' ? match.a : match.b;
    const rect = treeSlotRects[`${r}_${m}_${side}`];
    const svgEl = document.querySelector('#treeScroll svg');
    if(!rect || !svgEl) return;
    const already = svgEl.querySelector('foreignObject.tree-edit-fo');
    if(already) already.remove();
    const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
    fo.setAttribute('class', 'tree-edit-fo');
    fo.setAttribute('x', rect.x);
    fo.setAttribute('y', rect.y);
    fo.setAttribute('width', rect.w);
    fo.setAttribute('height', rect.h);
    const input = document.createElementNS('http://www.w3.org/1999/xhtml', 'input');
    input.setAttribute('type', 'text');
    input.setAttribute('class', 'tree-edit-input');
    input.value = current;
    input.setAttribute('list', 'rosterCandidatesBracket');
    input.addEventListener('click', ev=> ev.stopPropagation());
    fo.appendChild(input);
    svgEl.appendChild(fo);
    input.focus(); input.select();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val && val !== current){ AtsuCup.renameParticipant(current, val); }
      renderTree();
      renderExtras();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  function renderTree(){
    document.getElementById('treeScroll').innerHTML = buildTreeSVG(true);
    document.getElementById('treeScroll').style.setProperty('--svg-natural-w', lastSvgW + 'px');
    wireTreeInteractions();
  }

  async function buildTreeCanvas(){
    const svgStr = buildTreeSVG(false);
    const svgBlob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    try{
      const img = new Image();
      await new Promise((resolve,reject)=>{ img.onload=resolve; img.onerror=reject; img.src=url; });
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      return canvas;
    }finally{
      URL.revokeObjectURL(url);
    }
  }

  document.getElementById('saveBracketImgBtn').addEventListener('click', async ()=>{
    const canvas = await buildTreeCanvas();
    const cur = state.tournamentMeta;
    const link = document.createElement('a');
    const nameForFile = (cur && cur.title) ? cur.title.replace(/[^\w぀-ヿ一-鿿]/g,'') : 'tournament';
    link.download = `atsucup_bracket_${nameForFile}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  /* ---------- トーナメント表に統合した付随情報(次の対戦へのジャンプ・3位決定戦・警告・優勝) ---------- */
  function findNextMatch(){
    for(let r=0;r<state.matches.length;r++){
      for(let m=0;m<state.matches[r].length;m++){
        const match = state.matches[r][m];
        if(match.a && match.b && !match.winner){
          return {r,m,match};
        }
      }
    }
    if(state.thirdPlaceMatch && !state.thirdPlaceMatch.winner && state.thirdPlaceMatch.a && state.thirdPlaceMatch.b){
      return {r:'third', m:0, match:state.thirdPlaceMatch};
    }
    return null;
  }

  function pick(r, m, side){
    if(r === 'third'){ AtsuCup.pickThirdPlaceWinner(side); }
    else{ AtsuCup.pickWinner(r, m, side); }
    renderTree();
    renderExtras();
  }

  // トーナメント表が小さくなっても誤タップしにくいよう、対戦をタップすると
  // 「A vs B」がはっきり分かるモーダルを開いてから勝者を選べるようにする
  function openMatchPickModal(r, m){
    const match = state.matches[r] && state.matches[r][m];
    if(!match || !match.a || !match.b) return;
    const recMap = AtsuCup.recMapOf();
    document.getElementById('modalMatchTitle').textContent = AtsuCup.roundLabel(state.matches[r].length);
    const btnA = document.getElementById('modalPickA');
    const btnB = document.getElementById('modalPickB');
    btnA.innerHTML = `<span class="nm">${escapeHtml(match.a)}</span><span>${recMap[match.a]?'📹':'🚫'}</span>`;
    btnB.innerHTML = `<span class="nm">${escapeHtml(match.b)}</span><span>${recMap[match.b]?'📹':'🚫'}</span>`;
    btnA.classList.toggle('winner', match.winner===match.a);
    btnB.classList.toggle('winner', match.winner===match.b);
    btnA.onclick = ()=>{ pick(r, m, 'a'); closeMatchPickModal(); };
    btnB.onclick = ()=>{ pick(r, m, 'b'); closeMatchPickModal(); };
    document.getElementById('matchPickModal').style.display = 'flex';
  }
  function closeMatchPickModal(){
    document.getElementById('matchPickModal').style.display = 'none';
  }
  document.getElementById('matchPickModalBackdrop').addEventListener('click', closeMatchPickModal);
  document.getElementById('modalCancelBtn').addEventListener('click', closeMatchPickModal);

  // 次の対戦へトーナメント表をスクロールし、該当箇所を光らせて分かりやすくする
  function jumpToNextMatch(next){
    if(!next) return;
    if(next.r === 'third'){
      const el = document.getElementById('thirdPlaceCard');
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    const zones = document.querySelectorAll(`#treeScroll .tree-tap[data-r="${next.r}"][data-m="${next.m}"]`);
    if(!zones.length) return;
    // inline:'nearest'にして、必要最小限の横スクロールに留める(左端の名前欄が隠れないように)
    zones[0].scrollIntoView({behavior:'smooth', block:'center', inline:'nearest'});
    zones.forEach(z=>{
      z.classList.remove('tree-flash');
      void z.getBoundingClientRect();
      z.classList.add('tree-flash');
    });
  }

  // 3位決定戦の名前をタップで書き換える(トーナメント表には含まれないため、専用の簡易入力を使う)
  function startEditThirdName(side, scopeEl){
    const nmSpan = scopeEl ? scopeEl.querySelector('.nm') : null;
    if(!nmSpan) return;
    const match = state.thirdPlaceMatch;
    const current = side === 'a' ? match.a : match.b;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'nm-edit-input';
    input.value = current;
    input.setAttribute('list', 'rosterCandidatesBracket');
    input.addEventListener('click', ev=> ev.stopPropagation());
    nmSpan.replaceWith(input);
    input.focus(); input.select();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val && val !== current){ AtsuCup.renameParticipant(current, val); }
      renderTree();
      renderExtras();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  function pickBtnHtml(name, winner, r, m, side, recMap, isForced){
    const isWinner = winner === name;
    return `<div class="pick-btn ${isWinner?'winner':''} ${isForced?'forced':''}">
      <span class="pick-main" data-r="${r}" data-m="${m}" data-side="${side}">
        <span class="avatar">${escapeHtml(initials(name))}</span>
        <span class="nm">${escapeHtml(name)}</span>
        <span>${recMap[name]?'📹':'🚫'}</span>
      </span>
      <button class="pick-edit-btn" data-editname data-side="${side}">✏️</button>
    </div>`;
  }

  // 撮影不可同士が隣り合ってしまう回を避けるため、propagateByes()が単純な隣接ペアから
  // 入れ替えを行った試合を(実データと突き合わせて)検出する。表示上の注記に使う。
  function swappedMatchIndices(r){
    if(r === 0) return new Set();
    const prev = state.matches[r-1];
    const cur = state.matches[r];
    if(!prev || !cur || !prev.every(x=>x.winner)) return new Set();
    const winners = prev.map(x=>x.winner);
    const naive = [];
    for(let k=0;k<winners.length;k+=2){ naive.push([winners[k], winners[k+1]]); }
    const swapped = new Set();
    cur.forEach((m,i)=>{
      const pair = naive[i];
      if(!pair) return;
      const same = (m.a===pair[0] && m.b===pair[1]) || (m.a===pair[1] && m.b===pair[0]);
      if(!same) swapped.add(i);
    });
    return swapped;
  }

  function renderExtras(){
    const recMap = AtsuCup.recMapOf();

    const next = findNextMatch();
    const jumpRow = document.getElementById('jumpRow');
    if(next){
      jumpRow.style.display = 'block';
      document.getElementById('jumpNextBtn').onclick = ()=> jumpToNextMatch(next);
    }else{
      jumpRow.style.display = 'none';
    }

    let noticeHtml = '';
    const forced = AtsuCup.forcedPairsList();
    if(forced.length){
      noticeHtml += `<div class="warn-box">⚠️ 撮影OKの人が足りず、以下は撮影不可同士の対戦になっています:<br>` +
        forced.map(f=>`・${AtsuCup.roundLabel(state.matches[f.r].length)}: ${escapeHtml(f.a)} vs ${escapeHtml(f.b)}`).join("<br>") + `</div>`;
    }
    const swapNotes = [];
    state.matches.forEach((round, r)=>{
      swappedMatchIndices(r).forEach(i=>{
        swapNotes.push(`・${AtsuCup.roundLabel(round.length)}: ${escapeHtml(round[i].a)} vs ${escapeHtml(round[i].b)}`);
      });
    });
    if(swapNotes.length){
      noticeHtml += `<div class="swap-note">🔀 撮影不可の人が重ならないよう、以下の組み合わせを入れ替えました:<br>${swapNotes.join('<br>')}</div>`;
    }
    document.getElementById('noticeArea').innerHTML = noticeHtml;

    const thirdArea = document.getElementById('thirdPlaceArea');
    if(state.thirdPlaceMatch){
      const tp = state.thirdPlaceMatch;
      thirdArea.innerHTML = `<h3 class="section-title" style="margin-top:16px;">🥉 3位決定戦</h3>
        <div class="video-card" id="thirdPlaceCard">
          <div class="match-pick-row">
            ${pickBtnHtml(tp.a, tp.winner, 'third', 0, 'a', recMap, false)}
            <span class="vs-label">VS</span>
            ${pickBtnHtml(tp.b, tp.winner, 'third', 0, 'b', recMap, false)}
          </div>
        </div>`;
      thirdArea.querySelectorAll(".pick-main[data-r]").forEach(el=>{
        el.addEventListener("click", ()=>{ pick('third', 0, el.dataset.side); });
      });
      thirdArea.querySelectorAll("[data-editname]").forEach(el=>{
        el.addEventListener("click", (ev)=>{
          ev.stopPropagation();
          startEditThirdName(el.dataset.side, el.closest('.pick-btn'));
        });
      });
    }else{
      thirdArea.innerHTML = '';
    }

    const championArea = document.getElementById('championArea');
    if(state.winnerName){
      championArea.innerHTML = `<div class="champion-box"><div class="label">Champion</div><div class="name">👑 ${escapeHtml(state.winnerName)}</div>
        ${state.thirdPlaceMatch&&state.thirdPlaceMatch.winner?`<div style="color:var(--muted);font-weight:700;margin-bottom:10px;">🥉 3位: ${escapeHtml(state.thirdPlaceMatch.winner)}</div>`:''}
        <a class="btn btn-gold" style="width:100%; margin-bottom:10px;" href="results.html">🏆 最終結果を見る(1位〜4位・全順位)</a>
        <div class="row" style="justify-content:center;">
          <button class="btn btn-ghost" id="toCardBtn">優勝カードを作る</button>
          <a class="btn btn-ghost" href="hall.html">歴代優勝者を見る</a>
        </div>
      </div>`;
      document.getElementById("toCardBtn").addEventListener("click", ()=>{
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = 1000; tmpCanvas.height = 1000;
        AtsuCup.generateAndSaveCard(tmpCanvas, state.tournamentMeta.title, state.winnerName);
      });
    }else{
      championArea.innerHTML = '';
    }
  }

  renderTree();
  renderExtras();
})();
</script>
</body>
</html>
