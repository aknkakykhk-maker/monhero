<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あつ杯 対戦表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atsucup-style.css">
<style>
  .tree-title{font-family:'Cinzel','Noto Serif JP',serif; font-weight:900; font-size:16px; color:var(--gold); margin-bottom:10px;}
  .tree-scroll{
    overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:14px; border:1px solid var(--line);
    background:#0a0810; padding:10px 0;
  }
  .tree-scroll svg{ display:block; }
  .avatar{
    width:30px; height:30px; border-radius:50%; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900;
    color:var(--gold); flex-shrink:0;
  }
  .next-match-box{
    background:linear-gradient(180deg,rgba(255,145,69,.16),rgba(255,106,43,.06)); border:1px solid var(--ember2);
    border-radius:14px; padding:14px; margin-bottom:18px;
  }
  .next-match-box .lbl{font-size:11px; letter-spacing:.15em; color:var(--ember2); font-weight:900; text-transform:uppercase; margin-bottom:10px;}
  .match-pick-row{display:flex; flex-direction:column; gap:6px;}
  .pick-btn{
    display:flex; align-items:center; gap:6px; min-width:0; background:#161320; border:1px solid var(--line);
    border-radius:10px; color:var(--cream); font-weight:700; font-size:16px; padding:4px;
  }
  .pick-main{ flex:1; display:flex; align-items:center; gap:10px; min-width:0; padding:9px 8px; cursor:pointer; border-radius:8px; }
  .pick-main:active{ background:rgba(255,255,255,.08); }
  .pick-btn span.nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pick-btn.winner{ background:linear-gradient(90deg,rgba(232,179,76,.28),rgba(232,179,76,.08)); border-color:var(--gold-dim); color:var(--gold); font-weight:900; }
  .pick-btn.forced{ border-color:#7a2c2c; }
  .pick-edit-btn{
    flex-shrink:0; background:none; border:1px solid var(--line); border-radius:6px; color:var(--muted);
    font-size:14px; padding:0 10px; cursor:pointer; align-self:center; height:34px;
  }
  .nm-edit-input{
    flex:1; min-width:0; background:#0d0a14; border:1px solid var(--ember2); color:var(--cream);
    border-radius:6px; padding:7px 9px; font-size:15px; font-family:'Noto Sans JP',sans-serif;
  }
  .vs-label{ align-self:center; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; }
  .bye-row{ color:var(--muted); font-style:italic; font-size:15px; padding:10px 4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .bye-row .nm{ cursor:pointer; }
  .add-challenger-btn{
    flex-shrink:0; background:none; border:1px dashed var(--ember2); border-radius:6px; color:var(--ember2);
    font-size:11px; font-weight:700; padding:6px 9px; cursor:pointer; margin-left:auto;
  }
  .warn-box{
    margin-top:14px; background:#241214; border:1px solid #5a2222; border-radius:10px; padding:10px 12px;
    font-size:12px; color:#ffb3b3; line-height:1.8;
  }
  .champion-box{
    margin-top:18px; text-align:center; padding:22px 14px; border-radius:14px;
    background:radial-gradient(circle at 50% 0%, rgba(232,179,76,.2), transparent 70%), #14100a; border:1px solid var(--gold-dim);
  }
  .champion-box .label{font-size:11px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase;}
  .champion-box .name{
    font-family:'Cinzel','Noto Serif JP',serif; font-weight:900; font-size:26px; color:var(--gold);
    margin:6px 0 14px; text-shadow:0 0 16px rgba(232,179,76,.5);
  }
</style>
</head>
<body>
<a class="back-link" href="index.html">‹ トップへ</a>
<div class="wrap">
  <header class="top">
    <div class="crown-mark">🏆</div>
    <h1>対戦表</h1>
    <div class="sub">BRACKET</div>
  </header>

  <div id="emptyStateBox"></div>

  <section class="panel" id="treePanel" style="display:none;">
    <h2><span class="num">01</span> トーナメント表</h2>
    <div class="tree-title" id="treeTitle"></div>
    <p class="hint">横スクロールできます。勝ち上がった人の線は金色でつながり、優勝が決まるとトロフィーまで届きます。</p>
    <div class="tree-scroll" id="treeScroll"></div>
    <button class="btn btn-ghost" id="saveBracketImgBtn" style="margin-top:12px;">📸 画像で保存</button>
  </section>

  <section class="panel" id="progressPanel" style="display:none;">
    <h2><span class="num">02</span> 対戦を進める</h2>
    <div id="matchListArea"></div>
  </section>

  <footer class="note">参加者・大会・対戦結果・戦績は、すべてこの端末のブラウザ内に保存されます。</footer>
  <datalist id="rosterCandidatesBracket"></datalist>
</div>

<script src="tap-ripple.js"></script>
<script src="atsucup-core.js"></script>
<script>
(function(){
  "use strict";
  const state = AtsuCup.state;
  const escapeHtml = AtsuCup.escapeHtml;
  AtsuCup.restore();

  // 名前を書き換える際、登録済みの参加者を候補として選べるようにする
  document.getElementById('rosterCandidatesBracket').innerHTML =
    state.roster.map(n=>`<option value="${escapeHtml(n)}">`).join('');

  function initials(name){ return (name||'').trim().charAt(0) || '?'; }
  function truncate(s, n){ return (s && s.length > n) ? s.slice(0,n-1)+'…' : (s||''); }

  const hasPairing = state.matches.length>0 && state.matches[0].length>0 && state.remaining.length===0;

  if(!hasPairing){
    document.getElementById('emptyStateBox').innerHTML = `
      <section class="panel">
        <div class="empty-state"><span class="big">🎲</span>まだ組み合わせが決まっていません。</div>
        <a class="btn btn-primary" style="width:100%;" href="matchup.html">組み合わせを決める →</a>
      </section>
    `;
    return;
  }

  document.getElementById('treePanel').style.display = 'block';
  document.getElementById('progressPanel').style.display = 'block';
  document.getElementById('treeTitle').textContent = (state.tournamentMeta && state.tournamentMeta.title) || 'あつ杯 トーナメント表';

  /* ---------- 本物のトーナメント表(参加者を縦一列に並べ、線でつなぐ) ---------- */
  const TREE_ROW_H = 42;
  const TREE_LABEL_W = 132;
  const TREE_COL_W = 42;

  function leafY(i){ return (i+0.5)*TREE_ROW_H; }
  function jointY(r, i){
    if(r === 0) return (leafY(2*i) + leafY(2*i+1)) / 2;
    return (jointY(r-1, 2*i) + jointY(r-1, 2*i+1)) / 2;
  }
  function colX(r){ return TREE_LABEL_W + (r+1)*TREE_COL_W; }
  function findSrcIndex(round, name){
    if(!round || !name) return -1;
    return round.findIndex(x=>x.winner===name);
  }

  function buildTreeSVG(){
    const round0 = state.matches[0];
    const leafCount = round0.length * 2;
    const totalRounds = Math.round(Math.log2(leafCount));
    const recMap = AtsuCup.recMapOf();

    const trophyX = colX(totalRounds-1) + TREE_COL_W;
    const svgW = trophyX + 74;
    const svgH = leafCount * TREE_ROW_H;

    let leavesSvg = '';
    round0.forEach((m,i)=>{
      [[2*i, m.a, false], [2*i+1, m.b, m.b===null]].forEach(([idx, name, bye])=>{
        const y = leafY(idx);
        if(bye){
          leavesSvg += `<text x="6" y="${y+5}" font-size="13" font-style="italic" fill="#6b5f82">BYE</text>`;
        }else{
          const isChamp = !!state.winnerName && name === state.winnerName;
          leavesSvg += `<text x="6" y="${y+5}" font-size="13.5" font-weight="${isChamp?'900':'700'}" fill="${isChamp?'#e8b34c':'#f1e6cf'}">${escapeHtml(truncate(name,9))}</text>`;
          leavesSvg += `<text x="${TREE_LABEL_W-10}" y="${y+5}" font-size="11" text-anchor="end">${recMap[name]?'📹':'🚫'}</text>`;
        }
      });
    });

    let linesSvg = '';
    let labelsSvg = '';
    for(let r=0; r<totalRounds; r++){
      const matchCount = leafCount / Math.pow(2, r+1);
      const prevRound = r===0 ? null : state.matches[r-1];
      const stubStartX = r===0 ? TREE_LABEL_W : colX(r-1);
      const jx = colX(r);
      for(let i=0;i<matchCount;i++){
        const m = state.matches[r] && state.matches[r][i];
        let childY0, childY1;
        if(r === 0){
          childY0 = leafY(2*i); childY1 = leafY(2*i+1);
        }else{
          const srcA = m ? findSrcIndex(prevRound, m.a) : -1;
          const srcB = m ? findSrcIndex(prevRound, m.b) : -1;
          childY0 = jointY(r-1, srcA>=0?srcA:2*i);
          childY1 = jointY(r-1, srcB>=0?srcB:2*i+1);
        }
        const midY = (childY0+childY1)/2;
        const outEndX = (r === totalRounds-1) ? trophyX : colX(r+1);

        linesSvg += `<path d="M${stubStartX},${childY0} H${jx}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${stubStartX},${childY1} H${jx}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${jx},${childY0} V${childY1}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;
        linesSvg += `<path d="M${jx},${midY} H${outEndX}" stroke="#3a2f4d" stroke-width="2" fill="none"/>`;

        if(m && m.winner){
          const winY = (m.winner === m.a) ? childY0 : childY1;
          linesSvg += `<path d="M${stubStartX},${winY} H${jx}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;
          linesSvg += `<path d="M${jx},${winY} V${midY}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;
          linesSvg += `<path d="M${jx},${midY} H${outEndX}" stroke="#e8b34c" stroke-width="3" fill="none"/>`;
          labelsSvg += `<text x="${jx+6}" y="${midY-6}" font-size="11" font-weight="700" fill="#e8b34c">${escapeHtml(truncate(m.winner,8))}</text>`;
        }
      }
    }

    let trophySvg = '';
    if(state.winnerName){
      const finalY = jointY(totalRounds-1, 0);
      trophySvg = `<text x="${trophyX+8}" y="${finalY+8}" font-size="24">🏆</text>`;
    }

    return `<svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="${svgW}" height="${svgH}" fill="#0a0810"/>
      ${linesSvg}
      ${leavesSvg}
      ${labelsSvg}
      ${trophySvg}
    </svg>`;
  }

  function renderTree(){
    document.getElementById('treeScroll').innerHTML = buildTreeSVG();
  }

  async function buildTreeCanvas(){
    const svgStr = buildTreeSVG();
    const svgBlob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    try{
      const img = new Image();
      await new Promise((resolve,reject)=>{ img.onload=resolve; img.onerror=reject; img.src=url; });
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      return canvas;
    }finally{
      URL.revokeObjectURL(url);
    }
  }

  document.getElementById('saveBracketImgBtn').addEventListener('click', async ()=>{
    const canvas = await buildTreeCanvas();
    const cur = state.tournamentMeta;
    const link = document.createElement('a');
    const nameForFile = (cur && cur.title) ? cur.title.replace(/[^\w぀-ヿ一-鿿]/g,'') : 'tournament';
    link.download = `atsucup_bracket_${nameForFile}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  /* ---------- 対戦を進める(次の対戦・ラウンド別一覧) ---------- */
  function findNextMatch(){
    for(let r=0;r<state.matches.length;r++){
      for(let m=0;m<state.matches[r].length;m++){
        const match = state.matches[r][m];
        if(match.a && match.b && !match.winner){
          return {r,m,match};
        }
      }
    }
    if(state.thirdPlaceMatch && !state.thirdPlaceMatch.winner && state.thirdPlaceMatch.a && state.thirdPlaceMatch.b){
      return {r:'third', m:0, match:state.thirdPlaceMatch};
    }
    return null;
  }

  function pick(r, m, side){
    if(r === 'third'){ AtsuCup.pickThirdPlaceWinner(side); }
    else{ AtsuCup.pickWinner(r, m, side); }
    renderMatchList();
    renderTree();
  }

  // 対戦が始まった後でも名前をタップして書き換えられるようにする(全ラウンド・優勝者名まで連動して直る)
  function startEditMatchName(r, m, side){
    const mainEl = document.querySelector(`.pick-main[data-r="${r}"][data-m="${m}"][data-side="${side}"], .bye-nm[data-r="${r}"][data-m="${m}"][data-side="${side}"]`);
    if(!mainEl) return;
    const nmSpan = mainEl.classList.contains('bye-nm') ? mainEl : mainEl.querySelector('.nm');
    if(!nmSpan) return;
    const match = r === 'third' ? state.thirdPlaceMatch : state.matches[r][m];
    const current = side === 'a' ? match.a : match.b;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'nm-edit-input';
    input.value = current;
    input.setAttribute('list', 'rosterCandidatesBracket');
    input.addEventListener('click', ev=> ev.stopPropagation());
    nmSpan.replaceWith(input);
    input.focus(); input.select();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val && val !== current){ AtsuCup.renameParticipant(current, val); }
      renderMatchList();
      renderTree();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  // BYE(不戦勝)枠に大会途中の追加参加者を入れ、実際の対戦に変える
  function startAddChallenger(r, m){
    const btn = document.querySelector(`.add-challenger-btn[data-r="${r}"][data-m="${m}"]`);
    if(!btn) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'nm-edit-input';
    input.placeholder = '対戦相手の名前';
    input.setAttribute('list', 'rosterCandidatesBracket');
    input.addEventListener('click', ev=> ev.stopPropagation());
    btn.replaceWith(input);
    input.focus();
    let done = false;
    const commit = ()=>{
      if(done) return;
      done = true;
      const val = input.value.trim();
      if(val){ AtsuCup.addChallengerToBye(r, m, val); }
      renderMatchList();
      renderTree();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  }

  function pickBtnHtml(name, winner, r, m, side, recMap, isForced){
    const isWinner = winner === name;
    return `<div class="pick-btn ${isWinner?'winner':''} ${isForced?'forced':''}">
      <span class="pick-main" data-r="${r}" data-m="${m}" data-side="${side}">
        <span class="avatar">${escapeHtml(initials(name))}</span>
        <span class="nm">${escapeHtml(name)}</span>
        <span>${recMap[name]?'📹':'🚫'}</span>
      </span>
      <button class="pick-edit-btn" data-editname data-r="${r}" data-m="${m}" data-side="${side}">✏️</button>
    </div>`;
  }

  function matchCardHtml(m, r, i, recMap){
    if(m.b === null){
      return `<div class="video-card"><div class="bye-row">🐰 <span class="nm bye-nm" data-r="${r}" data-m="${i}" data-side="a">${escapeHtml(m.a)}</span> — BYE(不戦勝)
        <button class="pick-edit-btn" data-editname data-r="${r}" data-m="${i}" data-side="a">✏️</button>
        <button class="add-challenger-btn" data-addchallenger data-r="${r}" data-m="${i}">＋ 途中参加者を追加</button>
      </div></div>`;
    }
    const isForced = !recMap[m.a] && !recMap[m.b];
    return `<div class="video-card">
      <div class="match-pick-row">
        ${pickBtnHtml(m.a, m.winner, r, i, 'a', recMap, isForced)}
        <span class="vs-label">VS</span>
        ${pickBtnHtml(m.b, m.winner, r, i, 'b', recMap, isForced)}
      </div>
    </div>`;
  }

  function renderMatchList(){
    const area = document.getElementById('matchListArea');
    const recMap = AtsuCup.recMapOf();
    let html = '';

    const next = findNextMatch();
    if(next){
      const m = next.match;
      html += `<div class="next-match-box">
        <div class="lbl">🎯 次の対戦${next.r==='third'?'(3位決定戦)':''}</div>
        <div class="match-pick-row">
          ${pickBtnHtml(m.a, m.winner, next.r, next.m, 'a', recMap, false)}
          <span class="vs-label">VS</span>
          ${pickBtnHtml(m.b, m.winner, next.r, next.m, 'b', recMap, false)}
        </div>
      </div>`;
    }

    state.matches.forEach((round, r)=>{
      html += `<h3 class="section-title" style="margin-top:16px;">${AtsuCup.roundLabel(round.length)}</h3>`;
      round.forEach((m,i)=>{ html += matchCardHtml(m, r, i, recMap); });
    });

    const forced = AtsuCup.forcedPairsList();
    if(forced.length){
      html += `<div class="warn-box">⚠️ 撮影OKの人が足りず、以下は撮影不可同士の対戦になっています:<br>` +
        forced.map(f=>`・${AtsuCup.roundLabel(state.matches[f.r].length)}: ${escapeHtml(f.a)} vs ${escapeHtml(f.b)}`).join("<br>") + `</div>`;
    }

    if(state.thirdPlaceMatch){
      const tp = state.thirdPlaceMatch;
      html += `<h3 class="section-title" style="margin-top:16px;">🥉 3位決定戦</h3>
        <div class="video-card">
          <div class="match-pick-row">
            ${pickBtnHtml(tp.a, tp.winner, 'third', 0, 'a', recMap, false)}
            <span class="vs-label">VS</span>
            ${pickBtnHtml(tp.b, tp.winner, 'third', 0, 'b', recMap, false)}
          </div>
        </div>`;
    }

    if(state.winnerName){
      html += `<div class="champion-box"><div class="label">Champion</div><div class="name">👑 ${escapeHtml(state.winnerName)}</div>
        ${state.thirdPlaceMatch&&state.thirdPlaceMatch.winner?`<div style="color:var(--muted);font-weight:700;margin-bottom:10px;">🥉 3位: ${escapeHtml(state.thirdPlaceMatch.winner)}</div>`:''}
        <div class="row" style="justify-content:center;">
          <button class="btn btn-gold" id="toCardBtn">優勝カードを作る</button>
          <a class="btn btn-ghost" href="hall.html">歴代優勝者を見る</a>
        </div>
      </div>`;
    }

    area.innerHTML = html;
    area.querySelectorAll(".pick-main[data-r]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const r = el.dataset.r === 'third' ? 'third' : +el.dataset.r;
        pick(r, +el.dataset.m, el.dataset.side);
      });
    });
    area.querySelectorAll("[data-editname]").forEach(el=>{
      el.addEventListener("click", (ev)=>{
        ev.stopPropagation();
        const r = el.dataset.r === 'third' ? 'third' : +el.dataset.r;
        startEditMatchName(r, +el.dataset.m, el.dataset.side);
      });
    });
    area.querySelectorAll("[data-addchallenger]").forEach(el=>{
      el.addEventListener("click", (ev)=>{
        ev.stopPropagation();
        startAddChallenger(+el.dataset.r, +el.dataset.m);
      });
    });
    const toCardBtn = document.getElementById("toCardBtn");
    if(toCardBtn){
      toCardBtn.addEventListener("click", ()=>{
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = 1000; tmpCanvas.height = 1000;
        AtsuCup.generateAndSaveCard(tmpCanvas, state.tournamentMeta.title, state.winnerName);
      });
    }
  }

  renderTree();
  renderMatchList();
})();
</script>
</body>
</html>
