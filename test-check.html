<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断テスト</title>
<style>
  body { font-family: sans-serif; background:#0b0b18; color:#eee; padding:16px; }
  .ok { color:#4ade80; } .ng { color:#f87171; } .wait{ color:#fbbf24; }
  #log div { margin:4px 0; font-size:14px; }
  #app { margin-top:16px; padding:12px; border:1px solid #444; border-radius:8px; }
</style>
</head>
<body>
<h2>CDN / Babel / React 診断</h2>
<div id="log"></div>
<div id="app">（ここにReactが描画されれば成功）</div>

<script>
  var log = document.getElementById('log');
  function add(msg, cls){ var d=document.createElement('div'); d.className=cls||''; d.textContent=msg; log.appendChild(d); }
  add('① ページHTML: 読み込みOK', 'ok');
  window.addEventListener('error', function(e){ add('⚠ エラー: '+(e.message||'')+' @ '+(e.filename||''), 'ng'); });
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin
  onload="add('② React CDN: OK','ok')" onerror="add('② React CDN: 失敗(ブロックされてる)','ng')"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin
  onload="add('③ ReactDOM CDN: OK','ok')" onerror="add('③ ReactDOM CDN: 失敗','ng')"></script>
<script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js" crossorigin
  onload="add('④ lucide-react CDN: OK','ok')" onerror="add('④ lucide-react CDN: 失敗','ng')"></script>
<script src="https://cdn.tailwindcss.com"
  onload="add('⑤ Tailwind CDN: OK','ok')" onerror="add('⑤ Tailwind CDN: 失敗','ng')"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"
  onload="add('⑥ Babel CDN: OK','ok')" onerror="add('⑥ Babel CDN: 失敗','ng')"></script>

<script>
window.addEventListener('load', function(){
  setTimeout(function(){
    add('--- 各CDNの状態 ---','wait');
    add('React: ' + (window.React ? 'あり':'なし'), window.React?'ok':'ng');
    add('ReactDOM: ' + (window.ReactDOM ? 'あり':'なし'), window.ReactDOM?'ok':'ng');
    add('Babel: ' + (window.Babel ? 'あり':'なし'), window.Babel?'ok':'ng');
    add('lucide-react(LucideReact): ' + (window.LucideReact ? 'あり':'なし'), window.LucideReact?'ok':'ng');
    add('lucide-react(別名lucideReact): ' + (window.lucideReact ? 'あり':'なし'), '');

    // Babelで簡単なJSXを変換して描画テスト
    if(window.Babel && window.React && window.ReactDOM){
      try {
        var code = "const el = React.createElement('div',{style:{color:'#4ade80',fontWeight:'bold'}},'⑦ React描画: 成功！'); ReactDOM.createRoot(document.getElementById('app')).render(el);";
        (0,eval)(code);
        add('⑦ Babel+React 実行: OK','ok');
      } catch(e){ add('⑦ 実行エラー: '+e.message,'ng'); }
    } else {
      add('⑦ 前提CDN不足のためスキップ','ng');
    }
  }, 1500);
});
</script>
</body>
</html>
