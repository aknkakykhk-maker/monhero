<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Test 2 (jsDelivr)</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>body{background:#111;color:#fff;font-family:sans-serif;padding:20px;}</style>
</head>
<body>
<div id="root">読み込み中...</div>
<div id="diag" style="margin-top:16px;font-size:13px;"></div>
<script type="text/plain" id="game-src">
const { useState } = React;
function App(){
  const [n, setN] = useState(0);
  return React.createElement('div',{style:{padding:20}},
    React.createElement('h1',{style:{color:'#4ade80'}},'✅ jsDelivr方式は動いています！'),
    React.createElement('p',null,'カウント: '+n),
    React.createElement('button',{onClick:()=>setN(n+1),style:{padding:'8px 16px',fontSize:16,background:'#6366f1',color:'#fff',border:'none',borderRadius:8}},'+1')
  );
}
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
</script>
<script>
(function(){
  var d = document.getElementById('diag');
  function log(m,c){ var e=document.createElement('div'); e.style.color=c||'#ccc'; e.textContent=m; d.appendChild(e); }
  window.addEventListener('load', function(){
    setTimeout(function(){
      log('React: '+(window.React?'読込OK':'失敗'), window.React?'#4ade80':'#f87171');
      log('ReactDOM: '+(window.ReactDOM?'読込OK':'失敗'), window.ReactDOM?'#4ade80':'#f87171');
      log('Babel: '+(window.Babel?'読込OK':'失敗'), window.Babel?'#4ade80':'#f87171');
      if(window.Babel && window.React){
        try {
          var out = Babel.transform(document.getElementById('game-src').textContent, {presets:['react']}).code;
          (0,eval)(out);
        } catch(e){ document.getElementById('root').innerHTML='<pre style="color:#f88">'+e.message+'</pre>'; }
      } else {
        document.getElementById('root').innerHTML='<b style="color:#f88">CDN読込失敗（この環境は外部CDNをブロックしています）</b>';
      }
    }, 1200);
  });
})();
</script>
</body>
</html>
