<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LF Apps</title>
<meta name="theme-color" content="#000000">
<style>
  html, body { margin:0; padding:0; background:#000; overscroll-behavior:none; -webkit-tap-highlight-color:transparent; height:100%; }
  body {
    height:100dvh; box-sizing:border-box;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%, #111827 0%, #000000 65%);
  }
  .hub-title { color:#fff; font-weight:900; font-style:italic; font-size:15px; letter-spacing:4px; text-transform:uppercase; opacity:.55; }
  .hub-grid { display:flex; flex-direction:column; gap:16px; width:100%; max-width:360px; padding:0 24px; box-sizing:border-box; }
  .hub-card {
    display:flex; align-items:center; gap:16px;
    padding:20px; border-radius:24px; border:1px solid rgba(255,255,255,0.1);
    text-decoration:none; -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease;
  }
  .hub-card:active { transform:scale(0.96); }
  .hub-card.mh { background:linear-gradient(135deg, rgba(22,163,74,0.25), rgba(15,23,42,0.9)); box-shadow:0 0 30px rgba(34,197,94,0.12); }
  .hub-card.ac { background:linear-gradient(135deg, rgba(217,119,6,0.25), rgba(15,23,42,0.9)); box-shadow:0 0 30px rgba(251,191,36,0.12); }
  .hub-icon { font-size:34px; line-height:1; flex-shrink:0; }
  .hub-text { flex:1; min-width:0; }
  .hub-name { color:#fff; font-weight:900; font-size:17px; letter-spacing:.5px; }
  .hub-desc { color:rgba(255,255,255,0.55); font-size:11px; margin-top:4px; font-weight:600; }
  .hub-arrow { color:rgba(255,255,255,0.4); font-size:20px; flex-shrink:0; }
  .hub-footer { color:rgba(255,255,255,0.25); font-size:9px; font-family:monospace; letter-spacing:1px; margin-top:8px; }
  .update-banner {
    position:fixed; top:calc(10px + env(safe-area-inset-top)); left:0; right:0; z-index:2147483647;
    display:flex; justify-content:center; padding:0 16px; pointer-events:none;
  }
  .update-banner button {
    pointer-events:auto; background:#10b981; color:#000; font-weight:900; font-size:11px;
    padding:10px 16px; border-radius:999px; border:none; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:6px; animation:mhPulse 1.6s ease-in-out infinite;
    -webkit-tap-highlight-color:transparent;
  }
  .update-banner button:active { transform:scale(.95); }
  @keyframes mhPulse { 0%,100%{opacity:1;} 50%{opacity:.75;} }
  .mh-ripple {
    position:fixed; width:48px; height:48px; margin-left:-24px; margin-top:-24px;
    border-radius:9999px; border:2px solid rgba(255,255,255,0.9); box-shadow:0 0 10px rgba(255,255,255,0.6);
    transform-origin:center; animation:mhRipple 550ms ease-out forwards; pointer-events:none; z-index:2147483647;
  }
  @keyframes mhRipple { 0%{transform:scale(0.3);opacity:0.55;} 100%{transform:scale(1.8);opacity:0;} }
</style>
</head>
<body>
  <div class="update-banner" id="updateBanner" style="display:none;">
    <button id="updateReloadBtn">⟳ 新しいバージョンがあります。タップして更新</button>
  </div>
  <div class="hub-title">LF Apps</div>
  <div class="hub-grid">
    <a class="hub-card mh" href="monster-hero/index.html">
      <div class="hub-icon">🐲</div>
      <div class="hub-text">
        <div class="hub-name">モンスターヒーロー</div>
        <div class="hub-desc">絆を深めながら戦うカードバトルRPG</div>
      </div>
      <div class="hub-arrow">›</div>
    </a>
    <a class="hub-card ac" href="atsu-cup/index.html">
      <div class="hub-icon">🏆</div>
      <div class="hub-text">
        <div class="hub-name">あつ杯管理ツール</div>
        <div class="hub-desc">トーナメント表・組み合わせルーレット</div>
      </div>
      <div class="hub-arrow">›</div>
    </a>
  </div>
  <div class="hub-footer">SELECT AN APP</div>
</body>
<script>
(function(){
  // 更新のたびに手動で書き換える(日付+時刻、JST) ※version.jsonのbuildも同じ値に合わせること
  var HUB_BUILD = "2026-07-20 17:04";
  function checkVersion(){
    fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function(res){ return res.ok ? res.json() : null; })
      .then(function(data){
        if(data && data.build && data.build !== HUB_BUILD){
          document.getElementById('updateBanner').style.display = 'flex';
        }
      })
      .catch(function(){});
  }
  document.getElementById('updateReloadBtn').addEventListener('click', function(){ location.reload(); });
  document.addEventListener('pointerdown', function(e){
    var el = document.createElement('span');
    el.className = 'mh-ripple';
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 650);
  });
  checkVersion();
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState === 'visible') checkVersion(); });
  setInterval(checkVersion, 5 * 60 * 1000);
})();
</script>
</html>
