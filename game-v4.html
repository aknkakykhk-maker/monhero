<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>モンスターヒーロー</title>
<script>
window.__mhErr = function(msg){ try{ console.error(msg); }catch(_){} };
window.addEventListener('error', function(ev){ window.__mhErr('[error] ' + (ev.message||'') + ' @ ' + (ev.filename||'') + ':' + (ev.lineno||'')); });
window.addEventListener('unhandledrejection', function(ev){ window.__mhErr('[promise] ' + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason)); });
</script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin:0; padding:0; background:#000; overscroll-behavior:none; -webkit-tap-highlight-color:transparent; }
  #root { width:100%; height:100dvh; overflow:hidden; }
  #root > div { width:100%; height:100dvh; max-width:600px; margin:0 auto; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; background:#050510; color:#a5b4fc; font-family:sans-serif; z-index:99999; }
  .ldspin { width:44px; height:44px; border:4px solid rgba(165,180,252,0.25); border-top-color:#a5b4fc; border-radius:50%; animation:ldrot 0.8s linear infinite; }
  @keyframes ldrot { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="ver-banner" style="position:fixed;top:0;left:0;right:0;background:#16a34a;color:#fff;font:900 13px sans-serif;padding:6px 10px;z-index:100000;text-align:center;letter-spacing:1px;">GH-BUILD v56 / LOADING ENGINE...</div>
<div id="loading"><div class="ldspin"></div><div style="font-weight:900;letter-spacing:2px;">LOADING...</div></div>
<div id="root"></div>
<div style="position:fixed;bottom:2px;right:4px;font:900 9px monospace;color:rgba(255,255,255,0.35);z-index:99999;pointer-events:none;">LF</div>
<script src="data/images-ally.js?v=20260702b"></script>
<script src="data/images-enemy.js?v=20260701"></script>
<script src="data/ally-monsters.js?v=20260702"></script>
<script src="data/breeder.js?v=20260702d"></script>
<script src="data/enemy-monsters.js?v=20260701"></script>
<script src="data/skills.js?v=20260701"></script>
<script>
(function(){
  function fail(m){ if(window.__mhErr) window.__mhErr(m); else { document.body.innerHTML='<pre style="color:#f88;padding:16px;white-space:pre-wrap">'+m+'</pre>'; } }
  function run(){
    try {
      if(!window.Babel){ fail('Babel not loaded (CDN blocked?)'); return; }
      if(!window.React){ fail('React not loaded (CDN blocked?)'); return; }
      if(!window.ReactDOM){ fail('ReactDOM not loaded (CDN blocked?)'); return; }
      fetch('game-system.jsx?t=' + Date.now(), { cache: 'no-store' }).then(function(res){
        if(!res.ok) throw new Error('game-system.jsx fetch failed: ' + res.status);
        return res.text();
      }).then(function(src){
        var out;
        try {
          out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]], filename:'game-system.jsx' }).code;
          // 安全策: 万一 import/export 文が残っていても実行できるよう除去
          out = out.replace(/^\s*import\s+[^;]*;?\s*$/gm, '').replace(/^\s*export\s+default\s+/gm, '').replace(/^\s*export\s+/gm, '');
        } catch(e){ fail('Babel transform error: ' + (e && e.message ? e.message : e)); return; }
        try {
          (0, eval)(out);
        } catch(e){ fail('Runtime error: ' + (e && e.message ? e.message : e) + '\n' + (e && e.stack ? e.stack : '')); return; }
      }).catch(function(e){ fail('game-system.jsx load error: ' + (e && e.message ? e.message : e)); });
    } catch(e){ fail('Bootstrap error: ' + (e && e.message ? e.message : e)); }
  }
  if(document.readyState === 'complete' || document.readyState === 'interactive'){ setTimeout(run, 50); }
  else { window.addEventListener('DOMContentLoaded', function(){ setTimeout(run, 50); }); }
})();
</script>
</body>
</html>
